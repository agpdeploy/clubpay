<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-4xl text-emerald-500 mb-4"><i class="fa-solid fa-baseball-bat-ball"></i></div>
    <div class="font-bold text-xs uppercase tracking-widest text-emerald-500">Syncing...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-6xl mb-4 text-emerald-500 italic font-black">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight">ClubPay v2.7</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-widest">Enter</button>
    </div>
  </div>

  <div id="app" class="hidden flex flex-col min-h-screen mx-auto max-w-[480px]">
    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 uppercase tracking-tighter">ClubPay</h1>
        <p id="today-date" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest"></p>
      </div>
      <button onclick="loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 mb-6 hidden">
            <h2 id="match-vs" class="text-lg font-black italic"></h2>
            <p id="match-details" class="text-xs text-zinc-400 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2 mb-4">
            <input id="gameday-search" type="text" placeholder="Add player..." oninput="showGamedaySuggestions()" class="flex-1 bg-zinc-900 border-2 border-zinc-800 rounded-2xl px-4 py-4 text-lg outline-none focus:border-emerald-500"/>
            <button onclick="showAddPlayerModal('gameday')" class="bg-zinc-900 border-2 border-zinc-800 w-16 rounded-2xl text-emerald-500 flex items-center justify-center"><i class="fa-solid fa-user-plus text-xl"></i></button>
        </div>
        <div id="squad-suggestions-area" class="hidden mb-6"><div id="squad-chips" class="flex flex-wrap gap-2"></div></div>
        <div id="gameday-list" class="space-y-3"></div>
        <div id="finalize-area" class="hidden mt-8 pt-6 border-t border-zinc-800">
            <button onclick="confirmGameday()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase">Save Match Fees</button>
        </div>
      </div>

      <div id="players" class="screen mt-4">
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4 flex justify-between items-center">
            <div><div class="text-[9px] font-bold text-zinc-500 uppercase mb-1">Total Club Debt</div><div id="club-total-debt" class="text-2xl font-black text-red-500">-$0.00</div></div>
        </div>
        <input id="ledger-search" type="text" placeholder="Search master ledger..." oninput="renderPlayersList()" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 mb-4 outline-none focus:border-emerald-500"/>
        <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4">
        <div class="bg-zinc-900 border border-zinc-800 p-5 mb-6 rounded-3xl">
            <h2 class="font-bold mb-4 uppercase text-[10px] tracking-widest text-zinc-500">Teams</h2>
            <div class="flex gap-2 mb-4">
                <input id="new-team" placeholder="Team name" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none"/>
                <button onclick="addTeam()" class="bg-emerald-600 px-6 rounded-xl font-bold uppercase text-[10px]">Add</button>
            </div>
            <div id="teams-list" class="space-y-2"></div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-5 mb-6 rounded-3xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold uppercase text-[10px] tracking-widest text-zinc-500">Fixtures</h2>
                <button onclick="showFixtureModal()" class="text-emerald-500 text-xs font-bold">+ Add Game</button>
            </div>
            <div id="fixtures-list" class="space-y-2"></div>
        </div>

        <button onclick="showAddPlayerModal('setup')" class="w-full bg-zinc-800 py-4 rounded-xl font-bold text-emerald-500 border border-emerald-900/20 shadow-lg">+ New Master Profile</button>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
        <button onclick="switchScreen('teams')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-sliders text-xl mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <div id="player-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] backdrop-blur-sm">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 id="modal-title" class="text-xl font-bold mb-6 italic text-emerald-500 uppercase">Profile</h3>
      <div class="space-y-4">
        <input id="player-first" placeholder="First Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <input id="player-last" placeholder="Last Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <select id="player-team-assign" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm outline-none"></select>
        <div class="flex p-1 bg-zinc-800 rounded-xl">
            <button id="btn-member" onclick="setPlayerType(true)" class="flex-1 py-3 rounded-lg text-xs font-bold bg-emerald-600 text-white transition-all uppercase">Member</button>
            <button id="btn-casual" onclick="setPlayerType(false)" class="flex-1 py-3 rounded-lg text-xs font-bold text-zinc-500 transition-all uppercase">Casual</button>
        </div>
      </div>
      <div class="flex gap-3 mt-8">
        <button onclick="hideModal('player-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button>
        <button onclick="savePlayer()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Save</button>
      </div>
      <button id="btn-delete-player" onclick="deletePlayer()" class="hidden w-full mt-4 py-2 text-red-500 text-[10px] font-bold uppercase opacity-50">Delete Profile</button>
    </div>
  </div>

  <div id="fixture-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] backdrop-blur-sm">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 class="text-xl font-bold mb-6 italic text-emerald-500 uppercase">Add Match</h3>
      <div class="space-y-4">
        <select id="fix-team" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none text-sm"></select>
        <input id="fix-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <input id="fix-opponent" placeholder="vs Opponent" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
      </div>
      <div class="flex gap-3 mt-8">
        <button onclick="hideModal('fixture-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button>
        <button onclick="saveFixture()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Save Game</button>
      </div>
    </div>
  </div>

  <div id="history-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] backdrop-blur-md">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[400px] mx-4 p-6 flex flex-col max-h-[85vh] shadow-2xl">
      <div class="flex justify-between items-start mb-6 border-b border-zinc-800 pb-4">
        <div><h3 id="history-name" class="text-xl font-bold italic text-emerald-500 uppercase"></h3><p id="history-balance" class="text-[10px] font-black uppercase text-zinc-500 mt-1 tracking-widest"></p></div>
        <div class="flex gap-2"><button onclick="startEditPlayer()" class="text-zinc-400 h-10 w-10 rounded-full bg-zinc-800 flex items-center justify-center"><i class="fa-solid fa-pen-to-square"></i></button><button onclick="hideModal('history-modal')" class="text-zinc-500 h-10 w-10 rounded-full bg-zinc-800 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button></div>
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto space-y-2 pr-1 no-scrollbar"></div>
      <button onclick="hideModal('history-modal')" class="mt-6 w-full py-4 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase tracking-widest text-zinc-400">Close</button>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";

    let players = [];
    let transactions = [];
    let fixtures = [];
    let teams = JSON.parse(localStorage.getItem('clubpay_teams')) || [];
    let gamedaySquad = [];
    let activeTeamId = teams.length > 0 ? teams[0].id : null;
    let currentMatch = null;
    let selectedIsMember = true;
    let modalSource = 'setup';
    let currentEditId = null;

    async function loadData() {
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players || [];
            transactions = data.transactions || [];
            fixtures = data.fixtures || [];
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
            renderAll();
        } catch (e) { alert("Cloud Connection Failed."); }
        toggleLoader(false);
    }

    function renderAll() {
        renderTeamPills();
        renderPlayersList();
        renderGameday();
        renderTeams();
        updateClubDebt();
        renderSquadChips();
        renderFixturesList();
        populateTeamDropdowns();
        findCurrentMatch();
    }

    function findCurrentMatch() {
        const card = document.getElementById('fixture-card');
        if(!activeTeamId || fixtures.length === 0) { card.classList.add('hidden'); currentMatch = null; return; }
        const teamFix = fixtures.filter(f => f.teamId === activeTeamId).sort((a,b) => new Date(a.date) - new Date(b.date));
        currentMatch = teamFix.find(f => new Date(f.date) >= new Date(new Date().setHours(0,0,0,0)));
        if(currentMatch) {
            document.getElementById('match-vs').innerText = "vs " + (currentMatch.opponent || "TBA");
            document.getElementById('match-details').innerText = new Date(currentMatch.date).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
            card.classList.remove('hidden');
        } else { card.classList.add('hidden'); }
    }

    function renderTeamPills() {
        const container = document.getElementById('team-pills');
        container.innerHTML = teams.map(t => `<button onclick="setActiveTeam('${t.id}')" class="px-6 py-2 rounded-full whitespace-nowrap text-[10px] font-black uppercase border-2 transition-all ${activeTeamId === t.id ? 'bg-emerald-600 border-emerald-600 text-white shadow-lg shadow-emerald-900/20' : 'border-zinc-800 text-zinc-600'}">${t.name}</button>`).join('');
    }

    function setActiveTeam(id) { activeTeamId = id; renderAll(); }
    function getSafeBalance(pid) { return transactions.filter(t => t.playerId === pid).reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0); }

    function showGamedaySuggestions() {
        const term = document.getElementById('gameday-search').value.toLowerCase();
        const sug = document.getElementById('gameday-suggestions');
        if(!term) { sug.classList.add('hidden'); return; }
        const filtered = players.filter(p => !gamedaySquad.some(s => s.id === p.id) && (p.firstName + " " + p.lastName).toLowerCase().includes(term));
        sug.innerHTML = filtered.map(p => `<div onclick="addToGameday('${p.id}')" class="p-4 border-b border-zinc-800 flex justify-between items-center transition-colors"><div><div class="font-bold text-sm text-zinc-200">${p.firstName} ${p.lastName}</div><div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">${p.isMember ? 'Member' : 'Casual'}</div></div><div class="font-black ${getSafeBalance(p.id) < 0 ? 'text-red-500' : 'text-emerald-500'} italic text-sm">$${getSafeBalance(p.id).toFixed(2)}</div></div>`).join('');
        sug.classList.remove('hidden');
    }

    function addToGameday(id) {
        const p = players.find(x => x.id === id);
        if(!p) return;
        gamedaySquad.push({...p, paidToday: 0, payMethod: 'Cash'});
        document.getElementById('gameday-search').value = '';
        document.getElementById('gameday-suggestions').classList.add('hidden');
        renderAll();
    }

    function renderGameday() {
        const list = document.getElementById('gameday-list');
        document.getElementById('finalize-area').classList.toggle('hidden', gamedaySquad.length === 0);
        list.innerHTML = gamedaySquad.map(p => {
            const bal = getSafeBalance(p.id);
            return `<div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 flex flex-col gap-4 shadow-xl border-l-4 ${bal < 0 ? 'border-l-red-500' : 'border-l-emerald-500'}"><div class="flex justify-between items-center"><div><div class="font-bold text-zinc-100">${p.firstName} ${p.lastName}</div><div class="text-[9px] uppercase font-bold text-zinc-500 italic">$${bal.toFixed(2)}</div></div><button onclick="gamedaySquad = gamedaySquad.filter(x=>x.id!=='${p.id}'); renderAll();" class="text-zinc-700 h-10 w-10 rounded-full bg-zinc-800 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button></div><div class="flex gap-2 items-center bg-black/60 p-3 rounded-2xl border border-zinc-800"><div class="flex-1"><label class="text-[8px] uppercase text-zinc-500 block font-black mb-1">Received ($)</label><input type="number" placeholder="0" oninput="gamedaySquad.find(x=>x.id==='${p.id}').paidToday = parseFloat(this.value)||0" class="w-full bg-transparent font-black text-2xl text-emerald-500 outline-none px-1" /></div><button onclick="const x=gamedaySquad.find(y=>y.id==='${p.id}'); x.payMethod=x.payMethod==='Cash'?'Card':'Cash'; this.innerText=x.payMethod" class="text-[10px] bg-zinc-800 border border-zinc-700 px-5 py-2 rounded-xl font-black uppercase text-zinc-400">${p.payMethod}</button></div></div>`}).join('');
    }

    async function confirmGameday() {
        if(!activeTeamId) return alert('Select Team');
        const matchDate = currentMatch ? currentMatch.date : new Date().toISOString();
        const opponent = currentMatch ? currentMatch.opponent : "Casual Match";
        toggleLoader(true);
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logMatch", teamId: activeTeamId, squad: gamedaySquad, matchDate: matchDate, opponent: opponent }) });
            gamedaySquad = []; await loadData();
            alert("Match Fees Logged!");
        } catch(e) { alert("Save Error."); }
        toggleLoader(false);
    }

    async function savePlayer() {
        const f = document.getElementById('player-first').value.trim();
        const l = document.getElementById('player-last').value.trim();
        const t = document.getElementById('player-team-assign').value;
        if(!f || !l) return alert("Missing Info");
        toggleLoader(true);
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "savePlayer", id: currentEditId || 'p'+Date.now(), firstName: f, lastName: l, isMember: selectedIsMember, defaultTeam: t }) });
            hideModal('player-modal'); await loadData();
        } catch(e) { alert("Cloud Save Error."); }
        toggleLoader(false);
    }

    async function saveFixture() {
        const team = document.getElementById('fix-team').value;
        const date = document.getElementById('fix-date').value;
        const opp = document.getElementById('fix-opponent').value;
        if(!team || !date || !opp) return alert("Fill all info");
        toggleLoader(true);
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "saveFixture", id: 'fix'+Date.now(), teamId: team, date: date, opponent: opp, location: "Home" }) });
            hideModal('fixture-modal'); await loadData();
        } catch(e) { alert("Fixture Save Error."); }
        toggleLoader(false);
    }

    function renderFixturesList() {
        const list = document.getElementById('fixtures-list');
        const teamFix = fixtures.filter(f => f.teamId === activeTeamId).sort((a,b) => new Date(a.date) - new Date(b.date));
        list.innerHTML = teamFix.length === 0 ? `<div class="text-[10px] text-zinc-600 italic">No games scheduled</div>` :
            teamFix.map(f => `<div class="bg-zinc-800 p-3 rounded-xl flex justify-between text-xs font-bold"><span>vs ${f.opponent}</span><span class="text-zinc-500">${new Date(f.date).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}</span></div>`).join('');
    }

    function renderSquadChips() {
        const area = document.getElementById('squad-suggestions-area');
        const chipContainer = document.getElementById('squad-chips');
        const squadPlayers = players.filter(p => p.defaultTeam === activeTeamId && !gamedaySquad.some(s => s.id === p.id));
        if (squadPlayers.length === 0) { area.classList.add('hidden'); return; }
        area.classList.remove('hidden');
        chipContainer.innerHTML = squadPlayers.map(p => `<button onclick="addToGameday('${p.id}')" class="bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-xl text-[10px] font-black uppercase text-zinc-500 active:bg-emerald-600 transition-colors">+ ${p.firstName}</button>`).join('');
    }

    function populateTeamDropdowns() {
        const html = '<option value="">No Team</option>' + teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        document.getElementById('player-team-assign').innerHTML = html;
        document.getElementById('fix-team').innerHTML = html;
        if(activeTeamId) document.getElementById('fix-team').value = activeTeamId;
    }

    function updateClubDebt() {
        const total = players.reduce((sum, p) => { const b = getSafeBalance(p.id); return b < 0 ? sum + b : sum; }, 0);
        document.getElementById('club-total-debt').textContent = `$${Math.abs(total).toFixed(2)}`;
    }

    function renderPlayersList() {
        const term = document.getElementById('ledger-search')?.value.toLowerCase() || '';
        document.getElementById('players-list').innerHTML = players.filter(p => (p.firstName + " " + p.lastName).toLowerCase().includes(term)).map(p => `<div onclick="showHistory('${p.id}')" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center active:bg-zinc-800 cursor-pointer"><div><div class="font-bold text-zinc-100">${p.firstName} ${p.lastName}</div><div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">${p.isMember ? 'Member' : 'Casual'}</div></div><div class="text-xl font-black italic ${getSafeBalance(p.id) < 0 ? 'text-red-500' : 'text-emerald-500'}">$${getSafeBalance(p.id).toFixed(2)}</div></div>`).join('');
    }

    function showHistory(pid) {
        currentEditId = pid;
        const p = players.find(x => x.id === pid);
        const bal = getSafeBalance(pid);
        const history = transactions.filter(t => t.playerId === pid).reverse();
        document.getElementById('history-name').innerText = p.firstName + " " + p.lastName;
        document.getElementById('history-balance').innerText = "Running Balance: $" + bal.toFixed(2);
        document.getElementById('history-list').innerHTML = history.length === 0 ? `<div class="py-20 text-center opacity-30 text-xs font-bold uppercase tracking-widest italic">No History</div>` : 
            history.map(t => `<div class="bg-zinc-800/40 p-4 rounded-2xl border border-zinc-800/50 flex justify-between items-center shadow-inner"><div><div class="text-[8px] font-black uppercase text-zinc-500 mb-1 tracking-widest">${t.type.replace('_', ' ')}</div><div class="text-xs font-bold">${t.note || 'Entry'}</div></div><div class="text-sm font-black ${t.amount < 0 ? 'text-red-400' : 'text-emerald-400'}">${t.amount < 0 ? '-' : '+'}$${Math.abs(t.amount).toFixed(2)}</div></div>`).join('');
        document.getElementById('history-modal').classList.remove('hidden');
    }

    function addTeam() { const n = document.getElementById('new-team').value.trim(); if(!n) return; teams.push({id: 't'+Date.now(), name: n}); localStorage.setItem('clubpay_teams', JSON.stringify(teams)); document.getElementById('new-team').value = ''; renderAll(); }
    function renderTeams() { document.getElementById('teams-list').innerHTML = teams.map(t => `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex justify-between items-center shadow-sm"><span>${t.name}</span><button onclick="teams=teams.filter(x=>x.id!=='${t.id}'); localStorage.setItem('clubpay_teams', JSON.stringify(teams)); renderAll();" class="text-zinc-600 p-2"><i class="fa-solid fa-trash-can"></i></button></div>`).join(''); }
    function tryLogin() { document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); loadData(); }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
    function showFixtureModal() { document.getElementById('fixture-modal').classList.remove('hidden'); }
    function showAddPlayerModal(source) { modalSource = source; currentEditId = null; document.getElementById('modal-title').innerText = "New Player"; document.getElementById('player-first').value = ''; document.getElementById('player-last').value = ''; document.getElementById('player-team-assign').value = (source === 'gameday') ? activeTeamId : ""; document.getElementById('player-modal').classList.remove('hidden'); }
    function setPlayerType(m) { selectedIsMember = m; document.getElementById('btn-member').className = m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold' : 'flex-1 py-3 rounded-lg text-zinc-500'; document.getElementById('btn-casual').className = !m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold' : 'flex-1 py-3 rounded-lg text-zinc-500'; }
    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); document.querySelector(`button[onclick="switchScreen('${id}')"]`).classList.add('active'); }
  </script>
</body>
</html>
