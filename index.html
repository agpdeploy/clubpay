<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Fees Please v2.42 🏏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              400: 'rgb(var(--brand-rgb-light) / <alpha-value>)',
              500: 'rgb(var(--brand-rgb) / <alpha-value>)',
              600: 'rgb(var(--brand-rgb-dark) / <alpha-value>)'
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    :root { --brand-rgb: 16 185 129; --brand-rgb-dark: 5 150 105; --brand-rgb-light: 52 211 153; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: rgb(var(--brand-rgb)) !important; border-top: 3px solid rgb(var(--brand-rgb)); }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .chip-active { background: rgb(var(--brand-rgb-dark)) !important; color: white !important; border-color: rgb(var(--brand-rgb)) !important; }
    .audit-grid { display: grid; grid-template-columns: 1.4fr 0.7fr 0.8fr 0.8fr 0.8fr; gap: 4px; align-items: center; }
    .team-group-header { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; color: #71717a; margin-top: 28px; margin-bottom: 12px; padding-left: 6px; border-left: 4px solid rgb(var(--brand-rgb)); text-transform: uppercase; }
    nav { z-index: 100 !important; }
    .pay-btn.cash-active { background: #065f46; color: white; }
    .pay-btn.card-active { background: #1e40af; color: white; }
    .squad-check { transition: all 0.2s ease; border: 1px solid transparent; cursor: pointer; }
    .squad-check.selected { border-color: rgb(var(--brand-rgb)); background: rgb(var(--brand-rgb-dark)); color: white; }
    .picker-section-label { font-size: 10px; font-weight: 900; color: #3f3f46; text-transform: uppercase; letter-spacing: 0.1em; margin: 15px 0 8px 5px; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-bounce text-5xl text-brand-500 mb-6"><i id="loader-icon" class="fa-solid fa-microphone-lines"></i></div>
    <div id="loader-text" class="text-[13px] font-black uppercase tracking-[0.15em] text-brand-500 italic text-center px-10 leading-relaxed">Loading Data...</div>
  </div>

  <div id="sync-toast" class="fixed bottom-24 right-4 bg-zinc-900 border border-zinc-800 p-3 pr-5 rounded-2xl shadow-2xl flex items-center gap-4 z-[9000] transition-all duration-300 translate-y-10 opacity-0 pointer-events-none">
    <i id="toast-icon" class="fa-solid fa-circle-notch fa-spin text-brand-500 text-xl"></i>
    <div class="flex flex-col">
      <span id="toast-title" class="text-[10px] font-black uppercase text-white tracking-widest">Syncing</span>
      <span id="toast-msg" class="text-[9px] font-bold uppercase text-zinc-500 tracking-wider">Please wait...</span>
    </div>
  </div>

  <div id="login-screen" style="display:none;" class="fixed inset-0 bg-black flex-col items-center justify-center z-[1000]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl relative overflow-hidden animate-in fade-in duration-300">
      <div id="login-brand-area" class="mb-8 flex flex-col items-center justify-center min-h-[120px]">
          <div id="login-logo-fallback" class="text-7xl mb-3 text-brand-500 font-black italic">FP</div>
          <img id="login-logo-img" src="" class="h-20 w-auto mb-3 hidden object-contain" alt="Club Logo" />
          <h1 id="login-title" class="text-2xl font-bold italic text-white uppercase tracking-tight">Fees Please</h1>
      </div>
      <div class="space-y-3 mb-6 relative z-10">
        <input id="login-user" type="text" placeholder="Username" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-brand-500 transition-colors"/>
        <input id="login-pin" type="password" inputmode="numeric" placeholder="••••" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-brand-500 text-center tracking-[0.5em] transition-colors"/>
      </div>
      <button onclick="handleLogin()" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl uppercase tracking-widest text-sm shadow-lg active:scale-95 transition-all relative z-10">Sign In</button>
      <button onclick="localStorage.clear(); location.reload();" class="mt-4 text-zinc-600 text-[10px] uppercase font-bold tracking-widest relative z-10">Wipe Cache & Retry</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl relative">
    
    <div id="side-menu-overlay" class="hidden fixed inset-0 bg-black/60 z-[3000] backdrop-blur-sm transition-opacity" onclick="toggleMenu()"></div>
    <div id="side-menu" class="fixed top-0 right-0 bottom-0 w-64 bg-zinc-900 border-l border-zinc-800 z-[3001] translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-black/20">
            <div>
                <div class="text-[9px] font-black uppercase tracking-widest text-zinc-500 mb-1">Logged In As</div>
                <div id="menu-user-display" class="text-sm font-bold text-brand-500"></div>
            </div>
            <button onclick="toggleMenu()" class="text-zinc-500 active:scale-90 transition-transform"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <button id="menu-setup-btn" onclick="switchScreen('teams'); toggleMenu();" class="w-full flex items-center p-4 rounded-2xl hover:bg-zinc-800/50 active:bg-zinc-800 transition-colors group">
                <div class="w-8 flex justify-center"><i class="fa-solid fa-sliders text-zinc-500 group-hover:text-brand-500 transition-colors text-lg"></i></div>
                <span class="font-black text-[11px] text-zinc-300 uppercase tracking-widest ml-3">Admin Setup</span>
            </button>
            <button onclick="showAbout(); toggleMenu();" class="w-full flex items-center p-4 rounded-2xl hover:bg-zinc-800/50 active:bg-zinc-800 transition-colors group">
                <div class="w-8 flex justify-center"><i class="fa-solid fa-circle-info text-zinc-500 group-hover:text-brand-500 transition-colors text-lg"></i></div>
                <span class="font-black text-[11px] text-zinc-300 uppercase tracking-widest ml-3">About App</span>
            </button>
            <div class="my-4 border-t border-zinc-800/50 mx-2"></div>
            <button onclick="window.loadData(); toggleMenu();" class="w-full flex items-center p-4 rounded-2xl hover:bg-zinc-800/50 active:bg-zinc-800 transition-colors group">
                <div class="w-8 flex justify-center"><i class="fa-solid fa-cloud-arrow-down text-zinc-500 group-hover:text-brand-500 transition-colors text-lg"></i></div>
                <span class="font-black text-[11px] text-zinc-300 uppercase tracking-widest ml-3">Force Sync</span>
            </button>
        </div>
        <div class="p-6 border-t border-zinc-800 bg-black/20">
            <button onclick="logout()" class="w-full py-4 bg-red-950/20 text-red-500 font-black text-[11px] uppercase tracking-widest rounded-xl border border-red-900/20 shadow-md active:scale-95 transition-all"><i class="fa-solid fa-right-from-bracket mr-2"></i> Log Out</button>
        </div>
    </div>

    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div><h1 id="header-title" class="text-xl font-black italic text-brand-500 uppercase tracking-tighter truncate max-w-[200px]">Fees Please</h1><p id="active-season-label" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest"></p></div>
      <button onclick="toggleMenu()" class="text-brand-500 w-10 h-10 rounded-full bg-zinc-900 border border-zinc-800 active:scale-95 transition-transform flex items-center justify-center shadow-inner"><i class="fa-solid fa-bars text-lg"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-brand-500/10 border border-brand-500/20 rounded-2xl p-5 mb-4 hidden relative">
            <button onclick="openSquadPicker(activeFixtureId)" class="absolute top-1/2 -translate-y-1/2 right-5 h-10 w-10 bg-brand-600/20 text-brand-500 rounded-xl flex items-center justify-center border border-brand-600/30 shadow-inner active:scale-95 transition-all"><i class="fa-solid fa-user-pen"></i></button>
            <h2 id="match-vs" class="text-xl font-black italic text-brand-400 pr-12"></h2>
            <p id="match-details" class="text-sm text-zinc-400 font-bold uppercase"></p>
        </div>
        <div id="draft-chips" class="flex flex-wrap gap-2 mb-6 pb-6 border-b border-zinc-900"></div>
        <div id="bulk-payment-list" class="space-y-4"></div>
        <div id="bulk-save-area" class="hidden mt-8">
          <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl mb-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3"><i class="fa-solid fa-ticket text-zinc-500 text-lg"></i><span id="gameday-fee-label" class="text-[12px] font-black uppercase text-zinc-400">Fee ($0)</span></div>
            <button id="umpire-toggle" onclick="toggleUmpireFee()" class="w-14 h-7 rounded-full bg-zinc-800 relative transition-colors"><div id="umpire-ball" class="absolute top-1 left-1 w-5 h-5 rounded-full bg-zinc-600 transition-all"></div></button>
          </div>
          <div class="flex justify-between items-center mb-6 px-2"><span class="text-xs font-black uppercase text-zinc-500 italic">Total:</span><span id="session-total-display" class="text-3xl font-black text-brand-500 italic">$0.00</span></div>
          <button onclick="submitBulkPayments()" class="w-full bg-brand-600 text-white font-black py-7 rounded-3xl active:scale-95 shadow-xl uppercase tracking-widest">Save Payments</button>
        </div>
      </div>

      <div id="players" class="screen mt-4">
          <div id="team-pills-ledger" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6 shadow-lg border-t-4 border-t-brand-600">
              <div class="flex justify-between items-center mb-5"><h2 class="font-black uppercase text-[11px] tracking-widest text-brand-500 italic">Season Audit</h2><div id="team-season-total" class="text-xs font-black text-white bg-zinc-800 px-4 py-2 rounded-full uppercase"></div></div>
              <div class="audit-grid text-[9px] font-black text-zinc-500 uppercase tracking-tighter mb-4 px-1 border-b border-zinc-800 pb-2"><span>VS</span><span>Fee</span><span>Cash</span><span>Card</span><span class="text-right">Net</span></div>
              <div id="team-audit-list" class="space-y-4"></div>
          </div>
          <input id="ledger-search" type="text" placeholder="Search Ledger..." oninput="renderPlayersList()" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-4 text-sm mb-4 outline-none focus:border-brand-500 shadow-inner"/>
          <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4 pb-10">
        <div id="setup-content">
            <div class="bg-zinc-900 border border-zinc-800 p-6 mb-8 rounded-3xl shadow-lg border-t-4 border-t-brand-600">
                <h2 class="font-black mb-6 uppercase text-[11px] tracking-widest text-brand-500 italic text-center">Global Configuration</h2>
                <div class="mb-6">
                    <label class="text-[9px] uppercase font-bold text-brand-500 tracking-wider block mb-3 border-b border-zinc-800 pb-1">Branding</label>
                    <div class="flex gap-2 mb-3">
                        <div class="flex-1"><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1 font-bold">Club Name</label><input id="config-club-name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white shadow-inner"/></div>
                        <div class="flex-1"><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1 font-bold">Logo URL</label><input id="config-club-logo" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white shadow-inner"/></div>
                    </div>
                </div>
                <button onclick="handleConfigUpdate()" class="w-full bg-brand-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all">Save Configuration</button>
            </div>
            
            <div class="flex justify-between items-center mb-4 px-1 mt-8"><h2 class="text-[11px] font-black uppercase italic text-zinc-400">System Access</h2><button onclick="showUserModal()" class="text-brand-500 text-[11px] font-black uppercase tracking-widest">+ New User</button></div>
            <div id="setup-users-list" class="space-y-2 mb-10"></div>
            
            <div class="flex justify-between items-center mb-4 px-1 mt-8"><h2 class="text-[11px] font-black uppercase italic text-zinc-400">Manage Teams</h2><button onclick="showAddTeamModal()" class="text-brand-500 text-[11px] font-black uppercase tracking-widest">+ New Team</button></div>
            <div id="setup-team-list" class="flex flex-wrap gap-2 mb-10"></div>
            
            <div class="flex justify-between items-center mb-4 px-1 mt-8"><h2 class="text-[11px] font-black uppercase italic text-zinc-400">Fixtures</h2><button onclick="showAddFixtureModal()" class="text-brand-500 text-[11px] font-black uppercase tracking-widest">+ New Match</button></div>
            <div id="setup-fixture-list" class="space-y-3 mb-10"></div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md pb-8 pt-4">
      <div id="nav-bar" class="flex text-[11px] max-w-[480px] mx-auto font-black uppercase text-zinc-500">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-2xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-2xl mb-1"></i><span>Ledger</span></button>
      </div>
    </nav>
  </div>

  <div id="transaction-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[5000]">
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
          <h3 class="text-xl font-bold mb-6 text-brand-500 uppercase italic">Add Transaction</h3>
          <div class="space-y-4">
              <div class="flex p-1 bg-zinc-800 rounded-xl border border-zinc-700 shadow-inner">
                  <button id="btn-tx-pay" onclick="setTxType('payment')" class="flex-1 py-3 rounded-lg bg-brand-600 text-white font-bold text-xs">Payment (+)</button>
                  <button id="btn-tx-charge" onclick="setTxType('charge')" class="flex-1 py-3 rounded-lg text-zinc-500 font-bold text-xs">Charge (-)</button>
              </div>
              <select id="tx-fixture-select" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-zinc-300 outline-none focus:border-brand-500 shadow-inner text-sm"></select>
              <input id="tx-amount" type="number" inputmode="decimal" placeholder="Amount ($)" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-brand-500 shadow-inner text-xl font-black text-center"/>
              <input id="tx-note" type="text" placeholder="Method (e.g. Cash, Card, Transfer)" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-brand-500 shadow-inner"/>
          </div>
          <div class="flex gap-3 mt-8">
              <button onclick="hideModal('transaction-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button>
              <button onclick="saveManualTransaction()" class="flex-1 py-4 bg-brand-600 text-white rounded-xl font-bold uppercase text-[10px] shadow-lg active:scale-95 transition-all">Save</button>
          </div>
      </div>
  </div>

  <div id="history-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] backdrop-blur-md"><div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[440px] mx-4 p-6 flex flex-col max-h-[90vh] shadow-2xl"><div class="flex justify-between items-start mb-6 border-b border-zinc-800 pb-4"><div><h3 id="history-name" class="text-2xl font-black italic text-brand-500 uppercase tracking-tighter"></h3><p id="history-balance" class="text-[10px] font-black uppercase text-zinc-500 mt-1"></p></div><button onclick="hideModal('history-modal')" class="text-zinc-500 h-10 w-10 rounded-full bg-zinc-900 flex items-center justify-center shadow-inner"><i class="fa-solid fa-xmark"></i></button></div><div id="history-list" class="flex-1 overflow-y-auto space-y-2 pr-1 no-scrollbar"></div></div></div>
  <div id="user-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[2000]"><div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl"><h3 class="text-xl font-bold mb-6 text-brand-500 uppercase italic">System Access</h3><div class="space-y-4"><div><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1 font-bold">Username</label><input id="user-name-input" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white shadow-inner disabled:opacity-50"/></div><div><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1 font-bold">PIN</label><input id="user-pin-input" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white text-center tracking-[0.5em]"/></div><div><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1 font-bold">Role</label><select id="user-role-select" onchange="toggleUserTeamSelect()" class="w-full bg-zinc-800 rounded-xl px-4 py-4 text-sm text-white"><option value="captain">Captain</option><option value="admin">Admin</option></select></div><div id="user-team-container"><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1 font-bold">Assigned Team</label><select id="user-team-assign" class="w-full bg-zinc-800 rounded-xl px-4 py-4 text-sm text-white"></select></div></div><div class="flex gap-3 mt-8"><button onclick="hideModal('user-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button><button onclick="saveUser()" class="flex-1 py-4 bg-brand-600 text-white rounded-xl font-bold uppercase text-[10px]">Save User</button></div><div id="user-danger-zone" class="mt-4 pt-4 border-t border-zinc-800 text-center"><button onclick="handleDeleteUserAction()" class="text-red-500 text-[10px] font-black uppercase tracking-widest">Delete User</button></div></div></div>
  <div id="squad-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] backdrop-blur-md"><div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[440px] mx-4 p-6 flex flex-col max-h-[90vh]"><div class="flex justify-between items-center mb-4"><h3 id="squad-title" class="text-xl font-black italic text-brand-500 uppercase">Pick Squad</h3><button onclick="hideModal('squad-modal')" class="text-zinc-500"><i class="fa-solid fa-xmark text-xl"></i></button></div><input id="squad-search" type="text" placeholder="Search player..." oninput="renderSquadPicker()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 mb-4 text-white outline-none focus:border-brand-500 shadow-inner"/><div id="squad-picker-list" class="flex-1 overflow-y-auto space-y-2 pr-1 no-scrollbar"></div><div class="mt-6 flex gap-3"><button onclick="hideModal('squad-modal')" class="flex-1 py-4 bg-zinc-800 text-zinc-500 rounded-xl font-bold uppercase text-xs">Cancel</button><button id="confirm-squad-btn" onclick="saveSquad()" class="flex-1 py-4 bg-brand-600 text-white rounded-xl font-black uppercase text-xs shadow-lg">Update Squad</button></div></div></div>
  <div id="fixture-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[2000]"><div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl"><h3 id="fixture-modal-title" class="text-xl font-bold mb-6 text-brand-500 uppercase italic">Match</h3><div class="space-y-4 text-left"><label class="text-[9px] font-black uppercase text-zinc-500 ml-1">Assigned Team</label><select id="fixture-team-assign" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300 outline-none shadow-inner"></select><label class="text-[9px] font-black uppercase text-zinc-500 ml-1">Opponent</label><input id="fixture-opponent" placeholder="Opponent" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-brand-500 shadow-inner"/><label class="text-[9px] font-black uppercase text-zinc-500 ml-1">Date</label><input id="fixture-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 text-zinc-300 outline-none shadow-inner"/></div><div class="flex gap-3 mt-8"><button onclick="hideModal('fixture-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-xs">Cancel</button><button onclick="saveFixture()" class="flex-1 py-4 bg-brand-600 text-white rounded-xl font-bold uppercase text-xs shadow-lg">Save Match</button></div><div id="fixture-danger-zone" class="mt-4 pt-4 text-center border-t border-zinc-800"><button onclick="handleDeleteFixtureAction()" class="text-red-500 text-[10px] font-black uppercase">Delete Match</button></div></div></div>
  <div id="team-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[2000]"><div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl"><h3 class="text-xl font-bold mb-6 text-brand-500 uppercase text-center italic">New Team</h3><input id="team-name-input" placeholder="Team Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-brand-500"/><div class="flex gap-3 mt-8"><button onclick="hideModal('team-modal')" class="flex-1 py-4 text-zinc-500 font-bold">Cancel</button><button onclick="saveTeam()" class="flex-1 py-4 bg-brand-600 text-white rounded-xl font-bold uppercase text-xs shadow-lg">Create Team</button></div></div></div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzxo6c073cHLh67dGIewTsb1muNFI1PPGKJeMBg4MRnnIJ1_9NQYgdxGHC4DUjvy09H/exec";
    let players = [], transactions = [], fixtures = [], teams = [], fixturesSquad = [], users = [], config = {}, currentUser = null, activeTeamId = null, activeFixtureId = null, currentEditId = null, currentSquadFixtureId = null, currentUserEditId = null, currentTxPlayerId = null, currentTxType = 'payment';
    let currentThemeKey = "cricket";

    window.switchScreen = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); const btn = document.querySelector(`button[onclick*="${id}"]`); if(btn) btn.classList.add('active'); };
    window.toggleMenu = function() { const overlay = document.getElementById('side-menu-overlay'); const menu = document.getElementById('side-menu'); if (overlay.classList.contains('hidden')) { overlay.classList.remove('hidden'); setTimeout(() => menu.classList.remove('translate-x-full'), 10); } else { menu.classList.add('translate-x-full'); setTimeout(() => overlay.classList.add('hidden'), 300); } };
    window.showAbout = () => { document.getElementById('about-modal').classList.remove('hidden'); };
    window.hideModal = (id) => document.getElementById(id).classList.add('hidden');
    window.toggleLoader = (s) => { document.getElementById('loader').style.display = s ? 'flex' : 'none'; };
    window.logout = () => { localStorage.removeItem('cp_user'); location.reload(); };
    window.isWithinSeason = function(dStr) { if (!config.SeasonStart || !config.SeasonEnd) return true; const d = new Date(dStr); return d >= new Date(config.SeasonStart) && d <= new Date(config.SeasonEnd); };
    window.getSafeBalance = function(pid) { let tx = transactions.filter(t => String(t.playerId) === String(pid) && window.isWithinSeason(t.date)); return tx.reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0); };
    const formatAUDate = (dStr) => { if(!dStr) return "N/A"; const d = new Date(dStr); return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }); };
    const updateUI = (id, text) => { const el = document.getElementById(id); if (el) el.innerText = text; };

    window.handleLogin = async function() {
      const u = document.getElementById('login-user').value.trim().toLowerCase(); const p = document.getElementById('login-pin').value.trim();
      if(!u || !p) return alert("Credentials required"); window.toggleLoader(true);
      try {
        const res = await fetch(DATABASE_URL + "?action=getData");
        const rawText = await res.text(); let data = JSON.parse(rawText);
        const found = (data.users || []).find(x => String(x.username).toLowerCase() === u && String(x.pin) === p);
        if (found) { currentUser = found; localStorage.setItem('cp_user', JSON.stringify(found)); document.getElementById('login-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; loadWithUser(data); } else { alert("Invalid credentials."); }
      } catch (e) { alert("Sync Error."); } window.toggleLoader(false);
    }

    function loadWithUser(data) {
      players = data.players || []; transactions = data.transactions || []; fixtures = data.fixtures || []; teams = data.teams || []; fixturesSquad = data.fixturesSquad || []; config = data.config || {}; users = data.users || [];
      localStorage.setItem('cp_config', JSON.stringify(config)); document.getElementById('menu-user-display').innerText = currentUser.username;
      if (currentUser.role === 'captain') { activeTeamId = currentUser.teamId; document.getElementById('menu-setup-btn').style.display = 'none'; } else { if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id; document.getElementById('menu-setup-btn').style.display = 'flex'; }
      renderAll();
    }

    window.loadData = async function(isSilent = false) { if(!isSilent) window.toggleLoader(true); try { const res = await fetch(DATABASE_URL + "?action=getData"); const data = await res.json(); if (currentUser) loadWithUser(data); } catch(e) {} if(!isSilent) window.toggleLoader(false); }

    function renderAll() { 
      updateUI('active-season-label', config.CurrentSeason || "No Season"); 
      renderTeamPills(); renderPlayersList(); findCurrentMatch(); renderGamedaySelection(); renderTeamAudit(); renderSetupTeams(); renderSetupFixtures(); renderSetupUsers(); populateDropdowns(); 
    }

    // --- REBUILT AUDIT RENDERER (SMART PARSING) ---
    window.renderTeamAudit = function() { 
      const list = document.getElementById('team-audit-list'); if (!list) return; 
      const teamTx = transactions.filter(t => t.teamId === activeTeamId && window.isWithinSeason(t.date)); 
      const grouped = {};
      const feeLbl = config.FeeLabel || "Umpire Fee";
      
      teamTx.forEach(t => {
          if (!t.note) return;
          const parts = t.note.split(' - ');
          // For audit, if the note is "Manual: Card - Testers", parts[1] is "Testers"
          const opp = parts.length > 1 ? parts[parts.length-1].trim() : "Other";
          
          if (!grouped[opp]) grouped[opp] = { cash: 0, card: 0, fee: 0 };
          
          const noteLower = t.note.toLowerCase();
          
          if (t.type === 'expense' || noteLower.includes(feeLbl.toLowerCase())) { 
            grouped[opp].fee += Math.abs(t.amount); 
          } 
          else if (t.type === 'payment') {
            // Check note for keywords, default to cash if not found
            if (noteLower.includes('card') || noteLower.includes('transfer')) {
                grouped[opp].card += parseFloat(t.amount);
            } else {
                grouped[opp].cash += parseFloat(t.amount);
            }
          }
          // Note: match_fee types (debts) are not counted in revenue audit
      });

      let seasonTotal = 0; 
      list.innerHTML = Object.keys(grouped).map(opp => { 
        const g = grouped[opp]; const netProfit = g.cash + g.card - g.fee; seasonTotal += netProfit; 
        return `<div class="audit-grid text-zinc-300 font-bold border-b border-zinc-800 pb-3 text-[11px]"><span class="truncate pr-2">${opp}</span><span class="text-zinc-500">$${g.fee.toFixed(0)}</span><span class="text-brand-500">$${g.cash.toFixed(0)}</span><span class="text-blue-500">$${g.card.toFixed(0)}</span><span class="${netProfit<0?'text-red-500 text-right':'text-brand-400 text-right'} italic font-black text-xs">$${netProfit.toFixed(0)}</span></div>`; 
      }).join('') || `<div class="py-4 text-center opacity-30 text-xs font-black uppercase">No matches found</div>`; 
      updateUI('team-season-total', `$${seasonTotal.toFixed(0)} NET`); 
    }

    // --- MANUAL TRANSACTION LOGIC ---
    window.setTxType = function(type) {
        currentTxType = type;
        const payBtn = document.getElementById('btn-tx-pay');
        const chgBtn = document.getElementById('btn-tx-charge');
        if(type === 'payment') { payBtn.className = 'flex-1 py-3 rounded-lg bg-brand-600 text-white font-bold text-xs'; chgBtn.className = 'flex-1 py-3 rounded-lg text-zinc-500 font-bold text-xs'; } 
        else { chgBtn.className = 'flex-1 py-3 rounded-lg bg-red-600 text-white font-bold text-xs'; payBtn.className = 'flex-1 py-3 rounded-lg text-zinc-500 font-bold text-xs'; }
    }
    window.openTransactionModal = function(pid) { 
        currentTxPlayerId = pid; document.getElementById('tx-amount').value = ''; document.getElementById('tx-note').value = ''; window.setTxType('payment'); 
        const p = players.find(x => x.id === pid); const tId = p ? p.defaultTeam : activeTeamId;
        const teamFixs = fixtures.filter(f => f.teamId === tId).sort((a,b) => new Date(b.date) - new Date(a.date));
        const fixSelect = document.getElementById('tx-fixture-select');
        if(teamFixs.length > 0) {
            fixSelect.innerHTML = teamFixs.map(f => `<option value="${f.id}">vs ${f.opponent} (${formatAUDate(f.date)})</option>`).join('');
            const now = new Date(); const pastFix = teamFixs.find(f => new Date(f.date) <= now);
            fixSelect.value = pastFix ? pastFix.id : teamFixs[0].id;
        } else { fixSelect.innerHTML = `<option value="">No fixtures found</option>`; }
        document.getElementById('transaction-modal').classList.remove('hidden'); 
    }
    window.saveManualTransaction = async function() { 
        let amt = parseFloat(document.getElementById('tx-amount').value); 
        let userNote = document.getElementById('tx-note').value.trim(); 
        const fix = fixtures.find(f => f.id === document.getElementById('tx-fixture-select').value);
        if(!amt || isNaN(amt)) return alert("Amount required."); 
        if(currentTxType === 'charge') amt = -Math.abs(amt); else amt = Math.abs(amt); 
        const finalNote = fix ? `${userNote} - ${fix.opponent}` : userNote;
        const p = players.find(x => x.id === currentTxPlayerId);
        window.showToast("Saving", "Syncing..."); 
        try { 
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "saveTransaction", playerId: currentTxPlayerId, amount: amt, type: currentTxType === 'payment' ? 'payment' : 'manual_charge', note: finalNote, teamId: p ? p.defaultTeam : activeTeamId }) }); 
            window.hideModal('transaction-modal'); await window.loadData(true); window.showHistory(currentTxPlayerId); window.showToast("Success", "Transaction saved", true); 
        } catch(e) { window.hideToast(); alert("Failed."); } 
    }

    // --- STANDARD UI RENDERS (Pills, Lists, Modals) ---
    window.renderTeamPills = function() { const caps = currentUser?.role === 'captain'; [document.getElementById('team-pills-gameday'), document.getElementById('team-pills-ledger')].forEach(c => { if(!c) return; c.style.display = caps ? 'none' : 'flex'; c.innerHTML = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-6 py-3 rounded-full text-xs font-black uppercase border-2 transition-all ${activeTeamId === t.id ? 'bg-brand-600 border-brand-600 text-white shadow-lg' : 'border-zinc-800 text-zinc-600'}">${t.name}</button>`).join(''); }); }
    window.renderPlayersList = function() { const list = document.getElementById('players-list'); const term = document.getElementById('ledger-search')?.value.toLowerCase() || ''; let filtered = players.filter(p => { const teamMatch = (currentUser.role === 'admin') ? (p.defaultTeam === activeTeamId) : (p.defaultTeam === currentUser.teamId); return `${p.firstName} ${p.lastName}`.toLowerCase().includes(term) && teamMatch; }); list.innerHTML = filtered.map(p => { const bal = window.getSafeBalance(p.id); return `<div onclick="showHistory('${p.id}')" class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center mb-1 active:scale-95 transition-all shadow-sm"><div class="flex-1"><div class="font-bold text-zinc-100 text-base">${p.firstName} ${p.lastName}</div></div><div class="text-xl font-black ${bal<0?'text-red-500':'text-brand-500'} italic">$${bal.toFixed(2)}</div></div>`; }).join(''); }
    window.showHistory = function(pid) { currentEditId = pid; const p = players.find(x => x.id === pid); const bal = window.getSafeBalance(pid); let history = [...transactions.filter(t => String(t.playerId) === String(pid) && window.isWithinSeason(t.date))].reverse(); document.getElementById('history-name').innerText = p.firstName + " " + p.lastName; document.getElementById('history-balance').innerText = "Balance: $" + bal.toFixed(2); const list = document.getElementById('history-list'); let html = `<button onclick="openTransactionModal('${pid}')" class="w-full bg-brand-600/10 text-brand-500 border border-brand-500/20 font-black uppercase text-[10px] tracking-widest py-3 rounded-xl mb-4 shadow-sm active:scale-95 transition-all"><i class="fa-solid fa-plus mr-1"></i> Add Manual Transaction</button>`; html += history.length > 0 ? history.map(t => `<div class="bg-zinc-800/40 p-5 rounded-2xl border border-zinc-800 flex justify-between mb-2 shadow-inner"><div><div class="text-[10px] uppercase text-zinc-500 font-bold">${t.type === 'match_fee' ? 'Match Fee' : t.type}</div><div class="text-sm font-bold text-zinc-200">${t.note}</div></div><div class="text-base font-black ${parseFloat(t.amount)<0?'text-red-400':'text-brand-400'}">${parseFloat(t.amount)<0?'-':'+'}$${Math.abs(parseFloat(t.amount)).toFixed(2)}</div></div>`).join('') : `<div class="py-6 text-center opacity-30 text-xs font-black uppercase">No History</div>`; list.innerHTML = html; document.getElementById('history-modal').classList.remove('hidden'); }
    window.populateDropdowns = function() { const teamHtml = teams.map(t => `<option value="${t.id}">${t.name}</option>`).join(''); if(document.getElementById('fixture-team-assign')) document.getElementById('fixture-team-assign').innerHTML = '<option value="">Select Team</option>' + teamHtml; if(document.getElementById('user-team-assign')) document.getElementById('user-team-assign').innerHTML = '<option value="">Select Team</option>' + teamHtml; }
    window.renderSetupTeams = function() { const list = document.getElementById('setup-team-list'); if(!list) return; list.innerHTML = teams.map(t => `<div class="bg-zinc-900 border border-zinc-800 px-5 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-300 flex items-center gap-3">${t.name}</div>`).join(''); }
    window.renderSetupFixtures = function() { const list = document.getElementById('setup-fixture-list'); if(!list) return; let html = ""; teams.forEach(team => { const teamF = fixtures.filter(f => f.teamId === team.id && window.isWithinSeason(f.date)); html += `<div class="team-group-header uppercase">${team.name}</div>`; teamF.forEach(f => { html += `<div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 mb-3 flex justify-between items-center shadow-lg"><div><div class="font-bold text-sm text-white">vs ${f.opponent}</div><div class="text-[10px] text-brand-500 font-black uppercase">${formatAUDate(f.date)}</div></div></div>`; }); }); list.innerHTML = html; }
    window.renderSetupUsers = function() { const list = document.getElementById('setup-users-list'); if(!list) return; list.innerHTML = users.map(u => `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center shadow-sm"><div><div class="flex items-center gap-2 mb-1"><span class="text-[9px] font-black px-2 py-0.5 rounded border ${u.role === 'admin' ? 'bg-purple-900/20 border-purple-500/30 text-purple-400' : 'bg-brand-600/20 border-brand-500/30 text-brand-500'} uppercase">${u.role}</span><span class="font-bold text-white text-sm">${u.username}</span></div></div><button onclick="openEditUser('${u.username}')" class="h-10 w-10 bg-zinc-800 rounded-xl flex items-center justify-center text-zinc-500"><i class="fa-solid fa-pen text-xs"></i></button></div>`).join(''); }

    // --- INIT ---
    const saved = localStorage.getItem('cp_user');
    if (saved) { currentUser = JSON.parse(saved); document.getElementById('login-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; window.loadData(); } else { document.getElementById('login-screen').style.display = 'flex'; }
  </script>
</body>
</html>
