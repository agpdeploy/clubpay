<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v1.66 - Settings Restored</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .chip-active { background: #059669 !important; color: white !important; border-color: #10b981 !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .audit-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 8px; align-items: center; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-sync"></i></div>
    <div class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic">Rebuilding Settings...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase italic text-white">ClubPay 1.66</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Open Dashboard</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl">
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 uppercase tracking-tighter">ClubPay</h1>
        <p id="active-season-label" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest"></p>
      </div>
      <button onclick="window.loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 mb-4 hidden">
            <h2 id="match-vs" class="text-lg font-black italic text-emerald-400"></h2>
        </div>
        <div id="draft-chips" class="flex flex-wrap gap-2 mb-6"></div>
        <div id="bulk-payment-list" class="space-y-3"></div>
        <div id="bulk-save-area" class="hidden mt-8"><button onclick="submitBulkPayments()" class="w-full bg-emerald-600 text-white font-black py-6 rounded-3xl active:scale-95 transition-all uppercase tracking-widest italic shadow-xl">Save Selected Payments</button></div>
      </div>

      <div id="players" class="screen mt-4">
          <div id="team-pills-ledger" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
          <div id="players-list" class="space-y-2 mt-4"></div>
      </div>

      <div id="setup" class="screen mt-4 pb-10">
        <div class="bg-zinc-900 border border-zinc-800 p-5 mb-6 rounded-3xl shadow-lg border-t-4 border-t-emerald-600">
            <h2 class="font-black mb-4 uppercase text-[10px] tracking-widest text-emerald-500 italic text-center">Season Config</h2>
            <input id="season-input" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none mb-3 text-white font-bold text-center"/>
            <button onclick="handleSeasonUpdate()" class="w-full bg-emerald-600 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Update Season</button>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 p-5 mt-8 rounded-3xl shadow-lg">
            <div class="flex justify-between items-center mb-4"><h2 class="font-bold uppercase text-[10px] tracking-widest text-zinc-500">Master List</h2><button onclick="showAddPlayerModal()" class="text-emerald-500 text-[10px] font-black uppercase tracking-tighter">+ New Player</button></div>
            <div id="master-players-list" class="space-y-2"></div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50 text-zinc-400">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
        <button onclick="switchScreen('setup')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-sliders text-xl mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <div id="player-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 id="modal-title" class="text-xl font-bold mb-6 italic text-emerald-500 uppercase">Profile</h3>
      <div class="space-y-4">
        <input id="player-first" placeholder="First Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <input id="player-last" placeholder="Last Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <select id="player-team-assign" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm outline-none text-zinc-300"></select>
        <div class="flex p-1 bg-zinc-800 rounded-xl border border-zinc-700"><button id="btn-member" onclick="setPlayerType(true)" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase">Member</button><button id="btn-casual" onclick="setPlayerType(false)" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase">Casual</button></div>
      </div>
      <div class="flex gap-3 mt-8"><button onclick="hideModal('player-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button><button onclick="savePlayer()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Save</button></div>
      <div id="danger-zone" class="hidden mt-6 pt-6 border-t border-red-900/30 text-center"><button onclick="handleDeleteAction()" class="w-full py-3 text-red-500 border border-red-900/40 rounded-xl text-[10px] font-black uppercase tracking-widest">Delete Player</button></div>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxDqpgolrUY3RRBf7OzxMIpE6gIi1YgyYPUkBFlxKgpZ3G3IfUKyY6j3mZaTtBp810P/exec";
    
    let players = [], transactions = [], fixtures = [], teams = [], fixturesSquad = [], config = {};
    let activeTeamId = null, currentEditId = null, selectedIsMember = true;
    let selectedForPayment = [], persistentAmounts = {};

    function tryLogin() { document.getElementById('login').style.display = 'none'; document.getElementById('app').style.display = 'flex'; window.loadData(); }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`button[onclick*="${id}"]`); if(btn) btn.classList.add('active');
    }

    window.loadData = async function() {
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = (data.players || []).map(p => ({...p, id: String(p.id), defaultTeam: String(p.defaultTeam)}));
            transactions = (data.transactions || []).map(t => ({...t, playerId: String(t.playerId)}));
            fixtures = (data.fixtures || []).map(f => ({...f, id: String(f.id), teamId: String(f.teamId)}));
            teams = (data.teams || []).map(t => ({...t, id: String(t.id)}));
            fixturesSquad = (data.fixturesSquad || []).map(s => ({...s, fixtureId: String(s.fixtureId), playerId: String(s.playerId)}));
            config = data.config || {};
            
            if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id;
            renderAll();
        } catch (e) { alert("Sync failed."); }
        toggleLoader(false);
    }

    function renderAll() {
        document.getElementById('active-season-label').innerText = config.CurrentSeason || "No Season Set";
        renderTeamPills(); findCurrentMatch(); renderGamedaySelection(); renderPlayersList(); renderMasterPlayerList(); populateDropdowns();
    }

    function renderTeamPills() {
        const html = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-5 py-2 rounded-full text-[10px] font-black uppercase border-2 transition-all ${activeTeamId == t.id ? 'bg-emerald-600 border-emerald-600 text-white shadow-lg' : 'border-zinc-800 text-zinc-600'}">${t.name}</button>`).join('');
        document.getElementById('team-pills-gameday').innerHTML = html;
        document.getElementById('team-pills-ledger').innerHTML = html;
    }

    function findCurrentMatch() {
        const m = fixtures.find(f => f.teamId == activeTeamId);
        if(m) { document.getElementById('match-vs').innerText = "vs " + (m.opponent || 'TBA'); document.getElementById('fixture-card').classList.remove('hidden'); } 
        else { document.getElementById('fixture-card').classList.add('hidden'); }
    }

    function renderGamedaySelection() {
        const fixture = fixtures.find(f => f.teamId == activeTeamId);
        if (!fixture) { document.getElementById('draft-chips').innerHTML = ''; document.getElementById('bulk-payment-list').innerHTML = `<div class="py-10 text-center text-zinc-800 text-[10px] font-bold uppercase italic">No match scheduled</div>`; return; }
        const assignedIds = fixturesSquad.filter(s => s.fixtureId == fixture.id).map(s => s.playerId);
        const available = players.filter(p => assignedIds.includes(p.id));
        document.getElementById('draft-chips').innerHTML = available.map(p => `<button onclick="togglePlayerSelection('${p.id}')" class="px-4 py-3 rounded-2xl text-[10px] font-black border transition-all ${selectedForPayment.includes(p.id) ? 'chip-active' : 'bg-zinc-900 border-zinc-800 text-emerald-400'}">${p.firstName.toUpperCase()}</button>`).join('');
        if (selectedForPayment.length > 0) { document.getElementById('bulk-save-area').classList.remove('hidden'); document.getElementById('bulk-payment-list').innerHTML = selectedForPayment.map(pid => { const p = players.find(x => x.id == pid); const bal = transactions.filter(t => t.playerId == pid).reduce((s,t) => s + (parseFloat(t.amount)||0), 0); return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl flex items-center gap-4"><div class="flex-1"><div class="font-bold text-sm text-white">${p.firstName}</div><div class="text-[9px] text-zinc-500 font-black">Bal: $${bal.toFixed(2)}</div></div><div class="bg-black/40 px-3 py-2 rounded-xl border border-zinc-800"><input type="number" value="${persistentAmounts[pid] || ''}" oninput="persistentAmounts['${pid}']=this.value" placeholder="0" class="w-20 bg-transparent text-xl font-black text-emerald-500 outline-none text-right" /></div></div>`; }).join(''); } else { document.getElementById('bulk-save-area').classList.add('hidden'); document.getElementById('bulk-payment-list').innerHTML = ''; }
    }

    function togglePlayerSelection(pid) { if (selectedForPayment.includes(pid)) { selectedForPayment = selectedForPayment.filter(id => id !== pid); delete persistentAmounts[pid]; } else selectedForPayment.push(pid); renderGamedaySelection(); }

    function renderPlayersList() {
        const filtered = players.filter(p => p.defaultTeam == activeTeamId);
        document.getElementById('players-list').innerHTML = filtered.map(p => { const bal = transactions.filter(t => t.playerId == p.id).reduce((s,t) => s + (parseFloat(t.amount)||0), 0); return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-1"><div><div class="font-bold text-zinc-100 text-sm">${p.firstName} ${p.lastName}</div></div><div class="text-lg font-black ${bal<0?'text-red-500':'text-emerald-500'} italic">$${bal.toFixed(2)}</div></div>`; }).join('');
    }

    function renderMasterPlayerList() {
        document.getElementById('master-players-list').innerHTML = players.map(p => `<div class="bg-zinc-800/30 border border-zinc-800 p-3 rounded-xl flex justify-between items-center mb-1"><div class="font-bold text-xs">${p.firstName} ${p.lastName}</div><button onclick="openEditFromSetup('${p.id}')" class="h-8 w-8 bg-zinc-800 rounded-lg flex items-center justify-center text-zinc-400 active:bg-emerald-600 transition-colors"><i class="fa-solid fa-pen text-[10px]"></i></button></div>`).join('');
    }

    function openEditFromSetup(pid) { currentEditId = pid; const p = players.find(x => x.id === pid); document.getElementById('modal-title').innerText = "Edit Profile"; document.getElementById('player-first').value = p.firstName; document.getElementById('player-last').value = p.lastName; document.getElementById('player-team-assign').value = p.defaultTeam || ""; setPlayerType(p.isMember); document.getElementById('danger-zone').classList.remove('hidden'); document.getElementById('player-modal').classList.remove('hidden'); }
    function showAddPlayerModal() { currentEditId = null; document.getElementById('modal-title').innerText = "New Profile"; document.getElementById('player-first').value = ''; document.getElementById('player-last').value = ''; document.getElementById('player-team-assign').value = activeTeamId || ""; document.getElementById('danger-zone').classList.add('hidden'); document.getElementById('player-modal').classList.remove('hidden'); }
    function setPlayerType(m) { selectedIsMember = m; document.getElementById('btn-member').className = m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold' : 'flex-1 py-3 rounded-lg text-zinc-500 font-bold'; document.getElementById('btn-casual').className = !m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold' : 'flex-1 py-3 rounded-lg text-zinc-500 font-bold'; }
    function populateDropdowns() { const html = teams.map(t => `<option value="${t.id}">${t.name}</option>`).join(''); document.getElementById('player-team-assign').innerHTML = '<option value="">No Team Assigned</option>' + html; }

    async function savePlayer() {
        const f = document.getElementById('player-first').value.trim(); const l = document.getElementById('player-last').value.trim(); const t = document.getElementById('player-team-assign').value;
        const id = currentEditId || 'p'+Date.now(); toggleLoader(true);
        await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "savePlayer", id, firstName: f, lastName: l, isMember: selectedIsMember, defaultTeam: t }) });
        hideModal('player-modal'); await window.loadData();
    }

    async function handleSeasonUpdate() {
        const n = document.getElementById('season-input').value.trim(); if(!n) return alert("Enter name"); toggleLoader(true);
        await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "updateSeason", name: n, start: new Date(), end: new Date() }) });
        await window.loadData();
    }

    async function submitBulkPayments() {
        toggleLoader(true); const fixture = fixtures.find(f => f.teamId == activeTeamId); const opp = fixture ? fixture.opponent : 'Match';
        for (const pid of selectedForPayment) { const amt = parseFloat(persistentAmounts[pid]) || 0; if (amt > 0) await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logPaymentOnly", playerId: pid, amount: amt, teamId: activeTeamId, opponent: opp }) }); }
        selectedForPayment = []; persistentAmounts = {}; await window.loadData(); toggleLoader(false);
    }
  </script>
</body>
</html>
