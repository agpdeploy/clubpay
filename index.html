<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v1.44 Stable</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .chip-active { background: #059669 !important; color: white !important; border-color: #10b981 !important; }
    .audit-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 8px; align-items: center; }
  </style>

  <script>
    function tryLogin() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        window.loadData();
    }
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`button[onclick*="${id}"]`); if(btn) btn.classList.add('active');
    }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-sync"></i></div>
    <div class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic">Syncing...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase italic text-white">ClubPay 1.44</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Enter Dashboard</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl">
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <h1 class="text-xl font-black italic text-emerald-500 uppercase tracking-tighter">ClubPay</h1>
      <button onclick="window.loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 mb-4 hidden">
            <h2 id="match-vs" class="text-lg font-black italic text-emerald-400"></h2>
        </div>
        <div id="draft-chips" class="flex flex-wrap gap-2 mb-6"></div>
        <div id="bulk-payment-list" class="space-y-3"></div>
        <div id="bulk-save-area" class="hidden mt-8"><button onclick="submitBulkPayments()" class="w-full bg-emerald-600 text-white font-black py-6 rounded-3xl uppercase italic shadow-xl">Save Selected Payments</button></div>
      </div>

      <div id="players" class="screen mt-4">
          <div id="team-pills-ledger" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
          <div id="players-list" class="space-y-2 mt-4"></div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50 text-zinc-400">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
      </div>
    </nav>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxDqpgolrUY3RRBf7OzxMIpE6gIi1YgyYPUkBFlxKgpZ3G3IfUKyY6j3mZaTtBp810P/exec";
    
    let players = [], transactions = [], fixtures = [], teams = [], fixturesSquad = [];
    let activeTeamId = null, activeFixtureId = null;
    let selectedForPayment = [], persistentAmounts = {};

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    window.loadData = async function() {
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players || [];
            transactions = data.transactions || [];
            fixtures = data.fixtures || [];
            teams = data.teams || [];
            fixturesSquad = data.fixturesSquad || [];
            
            if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id;
            renderAll();
        } catch (e) { alert("Sync failed."); }
        toggleLoader(false);
    }

    function renderAll() {
        renderTeamPills(); findCurrentMatch(); renderPlayersList(); renderGamedaySelection();
    }

    function renderTeamPills() {
        const html = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-5 py-2 rounded-full text-[10px] font-black uppercase border-2 transition-all ${activeTeamId == t.id ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-zinc-800 text-zinc-600'}">${t.name}</button>`).join('');
        document.getElementById('team-pills-gameday').innerHTML = html;
        document.getElementById('team-pills-ledger').innerHTML = html;
    }

    function findCurrentMatch() {
        const m = fixtures.find(f => f.teamId == activeTeamId);
        if(m) {
            activeFixtureId = m.id;
            document.getElementById('match-vs').innerText = "vs " + m.opponent;
            document.getElementById('fixture-card').classList.remove('hidden');
        } else {
            activeFixtureId = null;
            document.getElementById('fixture-card').classList.add('hidden');
        }
    }

    function renderGamedaySelection() {
        const assignedIds = fixturesSquad.filter(s => s.fixtureId == activeFixtureId).map(s => s.playerId);
        const available = players.filter(p => assignedIds.includes(p.id));
        
        document.getElementById('draft-chips').innerHTML = available.map(p => {
            const initial = p.lastName ? ` ${p.lastName.charAt(0)}.` : '';
            return `<button onclick="togglePlayerSelection('${p.id}')" class="px-4 py-3 rounded-2xl text-[10px] font-black border ${selectedForPayment.includes(p.id) ? 'chip-active' : 'bg-zinc-900 border-zinc-800 text-emerald-400'}">${(p.firstName + initial).toUpperCase()}</button>`;
        }).join('');

        if (selectedForPayment.length > 0) {
            document.getElementById('bulk-save-area').classList.remove('hidden');
            document.getElementById('bulk-payment-list').innerHTML = selectedForPayment.map(pid => {
                const p = players.find(x => x.id == pid);
                const bal = transactions.filter(t => t.playerId == pid).reduce((s,t) => s + (parseFloat(t.amount)||0), 0);
                return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl flex items-center gap-4">
                    <div class="flex-1"><div class="font-bold text-sm text-white">${p.firstName}</div><div class="text-[9px] text-zinc-500 font-black">Bal: $${bal.toFixed(2)}</div></div>
                    <div class="bg-black/40 px-3 py-2 rounded-xl border border-zinc-800"><input type="number" value="${persistentAmounts[pid] || ''}" oninput="persistentAmounts['${pid}']=this.value" placeholder="0" class="w-20 bg-transparent text-xl font-black text-emerald-500 outline-none text-right" /></div>
                </div>`;
            }).join('');
        } else { document.getElementById('bulk-save-area').classList.add('hidden'); document.getElementById('bulk-payment-list').innerHTML = ''; }
    }

    function togglePlayerSelection(pid) {
        if (selectedForPayment.includes(pid)) { selectedForPayment = selectedForPayment.filter(id => id !== pid); delete persistentAmounts[pid]; } 
        else selectedForPayment.push(pid);
        renderGamedaySelection();
    }

    function renderPlayersList() {
        const filtered = players.filter(p => p.defaultTeam == activeTeamId);
        document.getElementById('players-list').innerHTML = filtered.map(p => {
            const bal = transactions.filter(t => t.playerId == p.id).reduce((s,t) => s + (parseFloat(t.amount)||0), 0);
            return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-1">
                <div class="font-bold text-zinc-100 text-sm">${p.firstName} ${p.lastName}</div>
                <div class="text-lg font-black ${bal<0?'text-red-500':'text-emerald-500'} italic">$${bal.toFixed(2)}</div>
            </div>`;
        }).join('');
    }

    async function submitBulkPayments() {
        toggleLoader(true);
        const opp = document.getElementById('match-vs').innerText.replace('vs ','');
        for (const pid of selectedForPayment) {
            const amt = parseFloat(persistentAmounts[pid]) || 0;
            if (amt > 0) await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logPaymentOnly", playerId: pid, amount: amt, teamId: activeTeamId, opponent: opp }) });
        }
        selectedForPayment = []; persistentAmounts = {};
        await window.loadData();
        toggleLoader(false);
    }
  </script>
</body>
</html>
