<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ClubPay Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; }
  </style>
</head>
<body>

  <div id="app" class="flex flex-col min-h-screen mx-auto max-w-[480px]">
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
      <h1 class="text-xl font-bold italic text-emerald-500">CLUBPAY LIVE</h1>
      <button onclick="loadData()" class="text-emerald-500 text-sm font-bold uppercase">Sync</button>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills" class="flex gap-2 overflow-x-auto pb-4"></div>
        <div class="relative mb-6">
            <input id="gameday-search" type="text" placeholder="Search player name..." oninput="showSuggestions()" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-4 text-lg outline-none focus:border-emerald-500"/>
            <div id="suggestions" class="hidden absolute z-50 left-0 right-0 mt-2 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl"></div>
        </div>
        <div id="gameday-list" class="space-y-3"></div>
        <button id="save-btn" onclick="confirmMatch()" class="hidden w-full bg-emerald-600 text-white font-bold py-5 rounded-2xl mt-8">SAVE MATCH TO CLOUD</button>
      </div>

      <div id="players" class="screen mt-4">
        <div class="bg-zinc-900 p-4 rounded-xl mb-4 border border-zinc-800">
            <p class="text-[10px] uppercase font-bold text-zinc-500">Club Debt</p>
            <p id="total-debt" class="text-2xl font-black text-red-500">$0.00</p>
        </div>
        <div id="players-list" class="space-y-2"></div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-zinc-900 z-50">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-bold uppercase py-4">
        <button onclick="switchScreen('log')" class="flex-1 nav-item active">GameDay</button>
        <button onclick="switchScreen('players')" class="flex-1 nav-item">Ledger</button>
      </div>
    </nav>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";

    let players = [], transactions = [], fixtures = [];
    let teams = JSON.parse(localStorage.getItem('clubpay_teams')) || [{id:'t1', name:'1st XI'}];
    let activeTeamId = teams[0].id;
    let squad = [];

    async function loadData() {
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players;
            transactions = data.transactions;
            fixtures = data.fixtures;
            renderAll();
        } catch (e) { alert("Sync Failed. Check Script Deployment."); }
    }

    function renderAll() {
        const pContainer = document.getElementById('team-pills');
        pContainer.innerHTML = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-4 py-2 rounded-full text-xs font-bold ${activeTeamId===t.id?'bg-emerald-600':'bg-zinc-800'}">${t.name}</button>`).join('');
        
        document.getElementById('players-list').innerHTML = players.map(p => {
            const b = transactions.filter(t=>t.playerId===p.id).reduce((s,t)=>s+t.amount, 0);
            return `<div class="bg-zinc-900 p-4 rounded-xl flex justify-between border border-zinc-800"><b>${p.firstName} ${p.lastName}</b><span class="${b<0?'text-red-500':'text-emerald-500'} font-bold">$${b.toFixed(2)}</span></div>`;
        }).join('');
        
        const debt = players.reduce((s,p)=> { const b=transactions.filter(t=>t.playerId===p.id).reduce((v,t)=>v+t.amount,0); return b<0?s+b:s; },0);
        document.getElementById('total-debt').innerText = '$' + Math.abs(debt).toFixed(2);
        
        renderSquad();
    }

    function showSuggestions() {
        const val = document.getElementById('gameday-search').value.toLowerCase();
        const sug = document.getElementById('suggestions');
        if(!val) return sug.classList.add('hidden');
        const filtered = players.filter(p => !squad.some(s=>s.id===p.id) && (p.firstName + " " + p.lastName).toLowerCase().includes(val));
        sug.innerHTML = filtered.map(p => `<div onclick="addToSquad('${p.id}')" class="p-4 border-b border-zinc-800">${p.firstName} ${p.lastName}</div>`).join('');
        sug.classList.remove('hidden');
    }

    function addToSquad(id) {
        const p = players.find(x=>x.id===id);
        squad.push({...p, paidToday: 0, payMethod: 'Cash'});
        document.getElementById('gameday-search').value = '';
        document.getElementById('suggestions').classList.add('hidden');
        renderSquad();
    }

    function renderSquad() {
        const list = document.getElementById('gameday-list');
        document.getElementById('save-btn').classList.toggle('hidden', squad.length === 0);
        list.innerHTML = squad.map(p => `
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-2">
                <div class="flex justify-between mb-2"><b>${p.firstName} ${p.lastName}</b><button onclick="squad=squad.filter(x=>x.id!=='${p.id}');renderSquad();">✕</button></div>
                <div class="flex gap-2">
                    <input type="number" placeholder="Paid $0" oninput="squad.find(x=>x.id==='${p.id}').paidToday=parseFloat(this.value)||0" class="flex-1 bg-black p-2 rounded text-emerald-500 font-bold"/>
                    <button onclick="const x=squad.find(y=>y.id==='${p.id}'); x.payMethod=x.payMethod==='Cash'?'Card':'Cash'; this.innerText=x.payMethod" class="bg-zinc-800 px-4 rounded text-[10px] font-bold uppercase">${p.payMethod}</button>
                </div>
            </div>
        `).join('');
    }

    async function confirmMatch() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "Syncing...";
        btn.disabled = true;
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logMatch", teamId: activeTeamId, squad: squad }) });
            squad = [];
            await loadData();
            alert("Success!");
        } catch(e) { alert("Error saving."); }
        btn.innerText = "SAVE MATCH TO CLOUD";
        btn.disabled = false;
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`button[onclick="switchScreen('${id}')"]`).classList.add('active');
    }

    window.onload = loadData;
  </script>
</body>
</html>
