<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-4xl text-emerald-500 mb-4"><i class="fa-solid fa-circle-notch"></i></div>
    <div class="font-bold text-xs uppercase tracking-widest text-emerald-500">Updating Ledger...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center">
      <div class="text-5xl mb-4 text-emerald-500 italic font-black">CP</div>
      <h1 class="text-2xl font-bold mb-6">ClubPay GameDay</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg">Enter Dashboard</button>
    </div>
  </div>

  <div id="app" class="hidden flex flex-col min-h-screen mx-auto max-w-[480px]">
    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 tracking-tighter">GAMEDAY LIVE</h1>
        <p id="today-date" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest"></p>
      </div>
      <button onclick="loadData()" class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-emerald-500">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div class="relative mb-6">
            <input id="gameday-search" type="text" placeholder="Add player to match..." oninput="showGamedaySuggestions()" class="w-full bg-zinc-900 border-2 border-emerald-900/20 rounded-2xl pl-12 pr-4 py-4 text-lg outline-none focus:border-emerald-500 transition-all"/>
            <div id="gameday-suggestions" class="hidden absolute z-50 left-0 right-0 mt-2 bg-zinc-900 border border-zinc-700 rounded-2xl max-h-60 overflow-auto shadow-2xl"></div>
        </div>
        <div id="gameday-list" class="space-y-3"></div>
        <div id="finalize-area" class="hidden mt-8 pt-6 border-t border-zinc-800">
            <button onclick="confirmGameday()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl">CONFIRM & SAVE SQUAD</button>
        </div>
      </div>

      <div id="players" class="screen mt-4">
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4 flex justify-between items-center">
            <div>
                <div class="text-[9px] font-bold text-zinc-500 uppercase mb-1">Total Owed</div>
                <div id="club-total-debt" class="text-xl font-black text-red-500">-$0.00</div>
            </div>
            <div class="text-right text-[10px] font-bold text-emerald-500 uppercase"><i class="fa-solid fa-cloud"></i> Cloud Sync</div>
        </div>
        <input id="ledger-search" type="text" placeholder="Search balances..." oninput="renderPlayersList()" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 mb-4 outline-none"/>
        <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4">
        <div class="bg-zinc-900 border border-zinc-800 p-5 mb-4">
            <h2 class="font-bold mb-4">Teams</h2>
            <div class="flex gap-2">
                <input id="new-team" placeholder="Team name" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"/>
                <button onclick="addTeam()" class="bg-emerald-600 px-6 rounded-xl font-bold">Add</button>
            </div>
        </div>
        <div id="teams-list" class="space-y-2 mb-8"></div>
        <button onclick="showAddPlayerModal()" class="w-full bg-zinc-800 py-4 rounded-xl font-bold text-emerald-500 border border-emerald-900/30">+ New Master Profile</button>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active">
          <i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span>
        </button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item">
          <i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span>
        </button>
        <button onclick="switchScreen('teams')" class="flex-1 flex flex-col items-center nav-item">
          <i class="fa-solid fa-sliders text-xl mb-1"></i><span>Setup</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="player-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 class="text-xl font-bold mb-6">Create Profile</h3>
      <input id="player-first" placeholder="First Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 mb-4"/>
      <input id="player-last" placeholder="Last Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 mb-4"/>
      <div class="flex p-1 bg-zinc-800 rounded-xl mb-6">
        <button id="btn-member" onclick="setPlayerType(true)" class="flex-1 py-3 rounded-lg text-xs font-bold bg-emerald-600 text-white">Member</button>
        <button id="btn-casual" onclick="setPlayerType(false)" class="flex-1 py-3 rounded-lg text-xs font-bold text-zinc-500">Casual</button>
      </div>
      <div class="flex gap-3">
        <button onclick="hideModal('player-modal')" class="flex-1 py-4 text-zinc-500 font-bold">Cancel</button>
        <button onclick="savePlayer()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold">Save</button>
      </div>
    </div>
  </div>

  <div id="history-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] backdrop-blur-md">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[400px] mx-4 p-6 flex flex-col max-h-[85vh]">
      <div class="flex justify-between items-start mb-6">
        <h3 id="history-name" class="text-xl font-bold italic text-emerald-500">Player History</h3>
        <button onclick="hideModal('history-modal')" class="text-zinc-500 text-xl"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto space-y-2 no-scrollbar"></div>
      <button onclick="hideModal('history-modal')" class="mt-6 w-full py-4 bg-zinc-800 rounded-2xl font-bold text-xs uppercase tracking-widest text-zinc-400">Close</button>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";

    let players = [];
    let transactions = [];
    let teams = JSON.parse(localStorage.getItem('clubpay_teams')) || [];
    let gamedaySquad = [];
    let activeTeamId = teams.length > 0 ? teams[0].id : null;
    let selectedIsMember = true;

    async function loadData() {
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players || [];
            transactions = data.transactions || [];
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
            renderAll();
        } catch (e) { console.error(e); alert("Sync Failed."); }
        toggleLoader(false);
    }

    function renderAll() {
        renderTeamPills();
        renderPlayersList();
        renderGameday();
        renderTeams();
        updateClubDebt();
    }

    function renderTeamPills() {
        const container = document.getElementById('team-pills');
        container.innerHTML = teams.map(t => `
            <button onclick="setActiveTeam('${t.id}')" class="px-6 py-2 rounded-full whitespace-nowrap text-[10px] font-black uppercase tracking-widest border-2 transition-all ${activeTeamId === t.id ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-zinc-800 text-zinc-600'}">
                ${t.name}
            </button>
        `).join('');
    }

    function setActiveTeam(id) { activeTeamId = id; renderTeamPills(); }

    function getSafeBalance(pid) {
        return transactions.filter(t => t.playerId === pid).reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
    }

    function showGamedaySuggestions() {
        const term = document.getElementById('gameday-search').value.toLowerCase();
        const sug = document.getElementById('gameday-suggestions');
        if(!term) { sug.classList.add('hidden'); return; }
        const filtered = players.filter(p => !gamedaySquad.some(s => s.id === p.id) && (p.firstName + " " + p.lastName).toLowerCase().includes(term));
        sug.innerHTML = filtered.map(p => `
            <div onclick="addToGameday('${p.id}')" class="p-4 border-b border-zinc-800 active:bg-zinc-800 flex justify-between items-center">
                <div><div class="font-bold text-sm">${p.firstName} ${p.lastName}</div><div class="text-[9px] text-zinc-500 uppercase">${p.isMember ? 'Member' : 'Casual'}</div></div>
                <div class="font-black ${getSafeBalance(p.id) < 0 ? 'text-red-500' : 'text-emerald-500'}">$${getSafeBalance(p.id).toFixed(2)}</div>
            </div>
        `).join('');
        sug.classList.remove('hidden');
    }

    function addToGameday(id) {
        const p = players.find(x => x.id === id);
        gamedaySquad.push({...p, paidToday: 0, payMethod: 'Cash'});
        document.getElementById('gameday-search').value = '';
        document.getElementById('gameday-suggestions').classList.add('hidden');
        renderGameday();
    }

    function renderGameday() {
        const list = document.getElementById('gameday-list');
        document.getElementById('finalize-area').classList.toggle('hidden', gamedaySquad.length === 0);
        list.innerHTML = gamedaySquad.map(p => `
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 flex flex-col gap-4 shadow-sm border-l-4 ${getSafeBalance(p.id) < 0 ? 'border-l-red-500' : 'border-l-emerald-500'}">
                <div class="flex justify-between items-center">
                    <div><b>${p.firstName} ${p.lastName}</b><div class="text-[9px] font-bold text-zinc-500">Bal: $${getSafeBalance(p.id).toFixed(2)}</div></div>
                    <button onclick="gamedaySquad = gamedaySquad.filter(x=>x.id!=='${p.id}'); renderGameday();" class="text-zinc-700"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="flex gap-2 items-center bg-black/60 p-3 rounded-2xl border border-zinc-800">
                    <input type="number" placeholder="Paid $0" oninput="gamedaySquad.find(x=>x.id==='${p.id}').paidToday = parseFloat(this.value)||0" class="flex-1 bg-transparent font-black text-2xl text-emerald-500 outline-none px-2" />
                    <button onclick="const x=gamedaySquad.find(y=>y.id==='${p.id}'); x.payMethod=x.payMethod==='Cash'?'Card':'Cash'; this.innerText=x.payMethod" class="text-[9px] bg-zinc-800 px-4 py-2 rounded-xl font-black uppercase text-zinc-400">${p.payMethod}</button>
                </div>
            </div>
        `).join('');
    }

    async function confirmGameday() {
        if(!activeTeamId) return alert('Select Team');
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logMatch", teamId: activeTeamId, squad: gamedaySquad }) });
            if (res.ok) { gamedaySquad = []; await loadData(); alert("Success!"); }
        } catch(e) { alert("Save Error."); }
        toggleLoader(false);
    }

    async function savePlayer() {
        const f = document.getElementById('player-first').value.trim();
        const l = document.getElementById('player-last').value.trim();
        if(!f || !l) return;
        toggleLoader(true);
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "savePlayer", id: 'p'+Date.now(), firstName: f, lastName: l, isMember: selectedIsMember }) });
            hideModal('player-modal'); await loadData();
        } catch(e) { alert("Error."); }
        toggleLoader(false);
    }

    function updateClubDebt() {
        const total = players.reduce((sum, p) => { const b = getSafeBalance(p.id); return b < 0 ? sum + b : sum; }, 0);
        document.getElementById('club-total-debt').textContent = `$${Math.abs(total).toFixed(2)}`;
    }

    function renderPlayersList() {
        const term = document.getElementById('ledger-search')?.value.toLowerCase() || '';
        document.getElementById('players-list').innerHTML = players.filter(p => (p.firstName + " " + p.lastName).toLowerCase().includes(term)).map(p => `
            <div onclick="showHistory('${p.id}')" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center active:bg-zinc-800 cursor-pointer">
                <div><b>${p.firstName} ${p.lastName}</b><div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">${p.isMember ? 'Member' : 'Casual'}</div></div>
                <div class="text-xl font-black italic ${getSafeBalance(p.id) < 0 ? 'text-red-500' : 'text-emerald-500'}">$${getSafeBalance(p.id).toFixed(2)}</div>
            </div>
        `).join('');
    }

    function showHistory(pid) {
        const p = players.find(x => x.id === pid);
        const history = transactions.filter(t => t.playerId === pid).reverse();
        document.getElementById('history-name').innerText = p.firstName + " " + p.lastName;
        document.getElementById('history-list').innerHTML = history.map(t => `<div class="bg-zinc-800/40 p-4 rounded-2xl border border-zinc-800 flex justify-between items-center"><div><div class="text-[8px] font-black uppercase text-zinc-500 tracking-widest">${t.type}</div><div class="text-xs font-bold">${t.note || 'Entry'}</div></div><div class="text-sm font-black ${t.amount < 0 ? 'text-red-400' : 'text-emerald-400'}">${t.amount < 0 ? '-' : '+'}$${Math.abs(t.amount).toFixed(2)}</div></div>`).join('');
        document.getElementById('history-modal').classList.remove('hidden');
    }

    function addTeam() {
        const n = document.getElementById('new-team').value.trim();
        if(!n) return;
        teams.push({id: 't'+Date.now(), name: n});
        localStorage.setItem('clubpay_teams', JSON.stringify(teams));
        document.getElementById('new-team').value = ''; renderAll();
    }

    function renderTeams() {
        document.getElementById('teams-list').innerHTML = teams.map(t => `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex justify-between items-center shadow-sm"><span>${t.name}</span><button onclick="teams=teams.filter(x=>x.id!=='${t.id}'); localStorage.setItem('clubpay_teams', JSON.stringify(teams)); renderAll();" class="text-zinc-600 p-2"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
    }

    function tryLogin() { document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); loadData(); }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
    function showAddPlayerModal() { document.getElementById('player-modal').classList.remove('hidden'); }
    function setPlayerType(m) { selectedIsMember = m; document.getElementById('btn-member').className = m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold' : 'flex-1 py-3 rounded-lg text-zinc-500'; document.getElementById('btn-casual').className = !m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold' : 'flex-1 py-3 rounded-lg text-zinc-500'; }
    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); document.querySelector(`button[onclick="switchScreen('${id}')"]`).classList.add('active'); }
  </script>
</body>
</html>
