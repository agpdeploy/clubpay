<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v1.57</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    #gameday-suggestions { position: fixed; background: #18181b; border: 2px solid #3f3f46; border-radius: 1rem; max-height: 300px; overflow-y: auto; z-index: 2000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
    .chip-active { background: #059669 !important; color: white !important; border-color: #10b981 !important; }
    .audit-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 8px; align-items: center; }
    .toggle-active { background: #059669 !important; color: white !important; }
    .save-indicator { position: fixed; bottom: 80px; right: 20px; background: #059669; color: white; padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: none; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
    .team-group-header { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; color: #52525b; margin-top: 24px; margin-bottom: 8px; padding-left: 4px; border-left: 3px solid #22c55e; }
  </style>

  <script>
    function tryLogin() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if (window.loadData) window.loadData();
    }
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const t = document.getElementById(id); if(t) t.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`button[onclick*="${id}"]`); if(btn) btn.classList.add('active');
    }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-sync"></i></div>
    <div id="loader-text" class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic text-center px-4">Establishing Handshake...</div>
  </div>

  <div id="save-pill" class="save-indicator animate-bounce"><i class="fa-solid fa-cloud-arrow-up mr-2"></i> Syncing...</div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase italic text-white">ClubPay 1.57</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Enter Dashboard</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl">
    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 uppercase tracking-tighter">ClubPay</h1>
        <p id="active-season-label" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest"></p>
      </div>
      <button onclick="window.loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 mb-4 hidden">
            <h2 id="match-vs" class="text-lg font-black italic text-emerald-400"></h2>
            <p id="match-details" class="text-xs text-zinc-400 font-bold uppercase"></p>
        </div>
        <div class="mb-4 relative">
            <input id="gameday-search" type="text" autocomplete="off" placeholder="Search for a Player" oninput="showGamedaySuggestions()" class="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl px-4 py-4 text-lg outline-none focus:border-emerald-500 shadow-inner"/>
            <div id="gameday-suggestions" class="hidden"></div>
        </div>
        <div id="draft-chips-label" class="mb-2 hidden"><p class="text-[8px] uppercase font-black text-zinc-600 mb-2 tracking-widest">Match Squad</p></div>
        <div id="draft-chips" class="flex flex-wrap gap-2 mb-6 pb-6 border-b border-zinc-900"></div>
        <div id="bulk-payment-list" class="space-y-3"></div>
        <div id="bulk-save-area" class="hidden mt-8"><button onclick="submitBulkPayments()" class="w-full bg-emerald-600 text-white font-black py-6 rounded-3xl active:scale-95 transition-all uppercase tracking-widest shadow-xl">Save Selected Payments</button></div>
      </div>

      <div id="players" class="screen mt-4">
          <div id="team-pills-ledger" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6 shadow-lg border-t-4 border-t-emerald-500">
              <div class="flex justify-between items-center mb-4"><h2 class="font-black uppercase text-[10px] tracking-widest text-emerald-500 italic">Financial Audit</h2><div id="team-season-total" class="text-[10px] font-black text-white bg-zinc-800 px-3 py-1 rounded-full uppercase"></div></div>
              <div class="audit-grid text-[8px] font-black text-zinc-600 uppercase tracking-widest mb-3 px-1"><span>Match</span><span>Due</span><span>Paid</span><span class="text-right">Balance</span></div>
              <div id="team-audit-list" class="space-y-3 max-h-48 overflow-y-auto no-scrollbar"></div>
          </div>
          <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4 pb-10">
        <div id="setup-fixture-list" class="space-y-2"></div>
        <div class="bg-zinc-900 border border-zinc-800 p-5 mt-8 rounded-3xl shadow-lg">
            <div class="flex justify-between items-center mb-4"><h2 class="font-bold uppercase text-[10px] tracking-widest text-zinc-500">Master List</h2><button onclick="showAddPlayerModal()" class="text-emerald-500 text-[10px] font-black uppercase tracking-tighter">+ New Player</button></div>
            <div id="master-players-list" class="space-y-2"></div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50 text-zinc-400">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
        <button onclick="switchScreen('teams')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-sliders text-xl mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <div id="squad-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] backdrop-blur-md">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[400px] mx-4 p-6 flex flex-col max-h-[85vh] shadow-2xl">
      <h3 class="text-xl font-black italic text-emerald-500 uppercase mb-4 text-center">Select Squad</h3>
      <div id="fixture-squad-picker" class="flex-1 overflow-y-auto space-y-2 no-scrollbar px-1"></div>
      <div class="flex gap-3 mt-6"><button onclick="hideModal('squad-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button><button onclick="saveFixtureSquad()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Confirm</button></div>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxDqpgolrUY3RRBf7OzxMIpE6gIi1YgyYPUkBFlxKgpZ3G3IfUKyY6j3mZaTtBp810P/exec";
    
    let players = [], transactions = [], fixtures = [], teams = [], fixturesSquad = [], config = {};
    let activeTeamId = null, activeFixtureId = null, viewSeason = 'all', currentEditId = null;
    let selectedForPayment = [], sessionProcessedIds = [];
    let persistentAmounts = {}; 

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function formatAUDate(dStr) { if(!dStr) return "N/A"; const d = new Date(dStr); return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }); }
    function updateUI(id, text) { const el = document.getElementById(id); if (el) el.innerText = text; }

    window.loadData = async function(isSilent = false) {
        if(!isSilent) toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            
            // THE RECOVERY SCRIPT: Map messy sheet headers to clean keys
            const mapData = (arr) => arr.map(item => {
                let clean = {};
                for (let k in item) {
                    let key = k.toLowerCase().replace(/\s/g, '');
                    if (key === "firstname") clean.firstName = item[k];
                    else if (key === "lastname") clean.lastName = item[k];
                    else if (key === "defaultteam" || key === "teamid") clean.teamId = String(item[k]);
                    else if (key === "playerid") clean.playerId = String(item[k]);
                    else if (key === "fixtureid") clean.fixtureId = String(item[k]);
                    else if (key === "id") clean.id = String(item[k]);
                    else clean[key] = item[k];
                }
                return clean;
            });

            players = mapData(data.players || []);
            transactions = mapData(data.transactions || []);
            fixtures = mapData(data.fixtures || []);
            teams = mapData(data.teams || []);
            fixturesSquad = mapData(data.fixturesSquad || []);
            config = data.config || {};
            
            if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id;
            renderAll();
        } catch (e) { if(!isSilent) alert("Sync failed."); }
        toggleLoader(false);
    }

    function getSafeBalance(pid) {
        return transactions.filter(t => t.playerId === pid).reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
    }

    function renderAll() {
        updateUI('active-season-label', config.currentseason || "Season 2026");
        renderTeamPills(); findCurrentMatch(); renderPlayersList(); renderGamedaySelection(); renderMasterPlayerList(); renderSetupFixtures(); renderTeamAudit();
    }

    function findCurrentMatch() {
        const card = document.getElementById('fixture-card');
        const m = fixtures.find(f => f.teamId === activeTeamId && new Date(f.date) >= new Date(new Date().setHours(0,0,0,0)));
        if(m) { activeFixtureId = m.id; updateUI('match-vs', "vs " + m.opponent); updateUI('match-details', formatAUDate(m.date)); card.classList.remove('hidden'); } 
        else { activeFixtureId = null; card.classList.add('hidden'); }
    }

    function renderGamedaySelection() {
        const chipContainer = document.getElementById('draft-chips');
        const bulkList = document.getElementById('bulk-payment-list');
        const label = document.getElementById('draft-chips-label');
        if (!activeFixtureId) {
            chipContainer.innerHTML = ''; label.classList.add('hidden'); bulkList.innerHTML = `<div class="py-10 text-center text-zinc-800 text-[10px] font-bold italic uppercase">No match scheduled</div>`; return;
        }
        const assignedIds = fixturesSquad.filter(s => s.fixtureId === activeFixtureId).map(s => s.playerId);
        const available = players.filter(p => assignedIds.includes(p.id) && !sessionProcessedIds.includes(p.id));
        label.classList.toggle('hidden', available.length === 0);
        chipContainer.innerHTML = available.map(p => {
            const initial = p.lastName ? ` ${p.lastName.charAt(0)}.` : '';
            return `<button onclick="togglePlayerSelection('${p.id}')" class="px-4 py-3 rounded-2xl text-[10px] font-black uppercase border transition-all ${selectedForPayment.includes(p.id) ? 'chip-active' : 'bg-zinc-900 border-zinc-800 text-emerald-400'}">${((p.firstName || 'N/A') + initial).toUpperCase()}</button>`;
        }).join('');
        if (selectedForPayment.length > 0) {
            document.getElementById('bulk-save-area').classList.remove('hidden');
            bulkList.innerHTML = selectedForPayment.map(pid => {
                const p = players.find(x => x.id === pid);
                return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl flex items-center gap-4"><div class="flex-1"><div class="font-bold text-sm text-white">${p.firstName}</div><div class="text-[9px] text-zinc-500 uppercase font-black">Bal: $${getSafeBalance(pid).toFixed(2)}</div></div><div class="bg-black/40 px-3 py-2 rounded-xl border border-zinc-800"><input type="number" id="amt-${pid}" value="${persistentAmounts[pid] || ''}" oninput="persistentAmounts['${pid}']=this.value" placeholder="0" class="w-20 bg-transparent text-xl font-black text-emerald-500 outline-none text-right" /></div></div>`;
            }).join('');
        } else { document.getElementById('bulk-save-area').classList.add('hidden'); bulkList.innerHTML = available.length > 0 ? `<div class="py-10 text-center text-zinc-700 text-[10px] uppercase">Select chips above</div>` : ''; }
    }

    function renderPlayersList() {
        const list = document.getElementById('players-list');
        let filtered = players.filter(p => p.teamId === activeTeamId);
        list.innerHTML = filtered.map(p => {
            const bal = getSafeBalance(p.id);
            return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-1"><div><div class="font-bold text-zinc-100 text-sm">${p.firstName} ${p.lastName || ''}</div></div><div class="text-lg font-black ${bal<0?'text-red-500':'text-emerald-500'} italic">$${bal.toFixed(2)}</div></div>`;
        }).join('');
    }

    function renderTeamPills() { [document.getElementById('team-pills-gameday'), document.getElementById('team-pills-ledger')].forEach(c => { if(c) c.innerHTML = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-5 py-2 rounded-full text-[10px] font-black uppercase border-2 transition-all ${activeTeamId === t.id ? 'bg-emerald-600 border-emerald-600 text-white shadow-lg' : 'border-zinc-800 text-zinc-600'}">${t.name || 'Team'}</button>`).join(''); }); }
    function togglePlayerSelection(pid) { if (selectedForPayment.includes(pid)) { selectedForPayment = selectedForPayment.filter(id => id !== pid); delete persistentAmounts[pid]; } else selectedForPayment.push(pid); renderGamedaySelection(); }
    function renderSetupFixtures() { const list = document.getElementById('setup-fixture-list'); list.innerHTML = fixtures.map(f => `<div class="bg-zinc-900 p-4 rounded-3xl border border-zinc-800 flex justify-between items-center mb-3"><div><div class="font-bold text-xs">vs ${f.opponent}</div><div class="text-[8px] text-emerald-500 font-black">${formatAUDate(f.date)}</div></div><button onclick="openSquadSelector('${f.id}')" class="bg-emerald-600/10 text-emerald-500 text-[8px] font-black px-4 py-2 rounded-xl border border-emerald-900/30">Squad</button></div>`).join(''); }
    function renderMasterPlayerList() { const list = document.getElementById('master-players-list'); list.innerHTML = players.map(p => `<div class="bg-zinc-800/30 border border-zinc-800 p-3 rounded-xl mb-1 text-xs font-bold">${p.firstName} ${p.lastName}</div>`).join(''); }
    function renderTeamAudit() { const list = document.getElementById('team-audit-list'); if (!list) return; const matches = [...new Set(transactions.filter(t => t.teamId === activeTeamId).map(t => t.note))]; list.innerHTML = matches.map(m => `<div class="audit-grid text-[10px] font-bold py-1 border-b border-zinc-800 text-zinc-400"><span>${m}</span><span>-</span><span>-</span><span class="text-right">Audit Active</span></div>`).join(''); }
    async function submitBulkPayments() { toggleLoader(true); const toPay = [...selectedForPayment]; const amounts = {...persistentAmounts}; const opp = document.getElementById('match-vs').innerText.replace('vs ','') || 'Match'; try { for (const pid of toPay) { const amt = parseFloat(amounts[pid]) || 0; if (amt > 0) { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logPaymentOnly", playerId: pid, amount: amt, teamId: activeTeamId, opponent: opp }) }); } sessionProcessedIds.push(pid); } selectedForPayment = []; persistentAmounts = {}; await window.loadData(); } catch(e) { alert("Save failed."); } toggleLoader(false); }
    function openSquadSelector(fid) { activeFixtureId = fid; const currentSquadIds = fixturesSquad.filter(s => s.fixtureId === fid).map(s => s.playerId); const list = document.getElementById('fixture-squad-picker'); list.innerHTML = players.map(p => `<div class="bg-zinc-800/40 p-4 rounded-2xl flex justify-between border border-zinc-800 mb-2"><span class="font-bold text-sm">${p.firstName} ${p.lastName}</span><input type="checkbox" value="${p.id}" ${currentSquadIds.includes(p.id) ? 'checked' : ''} class="w-6 h-6"></div>`).join(''); document.getElementById('squad-modal').classList.remove('hidden'); }
    async function saveFixtureSquad() { const checks = document.querySelectorAll('#fixture-squad-picker input:checked'); const ids = Array.from(checks).map(c => c.value); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "saveFixtureSquad", fixtureId: activeFixtureId, playerIds: ids }) }); hideModal('squad-modal'); await window.loadData(); } catch(e) { alert("Error"); } toggleLoader(false); }
  </script>
</body>
</html>
