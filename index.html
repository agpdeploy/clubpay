<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fees Please v1.85 🏏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .chip-active { background: #059669 !important; color: white !important; border-color: #10b981 !important; }
    .audit-grid { display: grid; grid-template-columns: 1.2fr 0.9fr 0.8fr 0.8fr; gap: 8px; align-items: center; }
    .team-group-header { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; color: #71717a; margin-top: 28px; margin-bottom: 12px; padding-left: 6px; border-left: 4px solid #22c55e; }
    nav { z-index: 100 !important; }
    .pay-method-toggle { display: flex; background: #0a0a0a; border: 1px solid #27272a; border-radius: 14px; padding: 3px; gap: 2px; }
    .pay-btn { padding: 8px 16px; border-radius: 10px; font-size: 14px; transition: all 0.2s; color: #52525b; }
    .pay-btn.cash-active { background: #065f46; color: #fff; }
    .pay-btn.card-active { background: #1e40af; color: #fff; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-bounce text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-microphone-lines"></i></div>
    <div id="loader-text" class="text-[13px] font-black uppercase tracking-[0.15em] text-emerald-500 italic text-center px-10 leading-relaxed">Checking the pitch...</div>
  </div>

  <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[1000]">
    <button onclick="localStorage.clear(); location.reload();" class="absolute top-8 right-8 text-zinc-800 hover:text-red-500 transition-colors"><i class="fa-solid fa-power-off text-2xl"></i></button>
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">FP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase italic text-white">Fees Please v1.85</h1>
      <div class="space-y-3 mb-6">
        <input id="login-user" type="text" placeholder="Username" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-emerald-500 mb-2"/>
        <input id="login-pin" type="password" inputmode="numeric" placeholder="••••" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-emerald-500 text-center tracking-[0.5em]"/>
      </div>
      <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Sign In</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl">
    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div><h1 class="text-2xl font-black italic text-emerald-500 uppercase tracking-tighter">Fees Please</h1><p id="active-season-label" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest"></p></div>
      <div class="flex items-center gap-3">
        <span id="user-display" class="text-[9px] font-black uppercase text-zinc-500 bg-zinc-900 px-2 py-1 rounded border border-zinc-800"></span>
        <button onclick="window.loadData()" class="text-emerald-500 w-12 h-12 rounded-full bg-zinc-900 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate text-lg"></i></button>
        <button onclick="logout()" class="text-red-900/60 w-10 h-10 rounded-full bg-zinc-900 active:scale-90 transition-all border border-red-950/20"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4">
      <div id="log" class="screen active mt-4">
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-5 mb-4 hidden">
            <h2 id="match-vs" class="text-xl font-black italic text-emerald-400"></h2>
            <p id="match-details" class="text-sm text-zinc-400 font-bold uppercase"></p>
        </div>
        <div class="mb-4 relative">
            <input id="gameday-search" type="text" autocomplete="off" placeholder="Search Player" oninput="showGamedaySuggestions()" class="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl px-5 py-5 text-xl outline-none focus:border-emerald-500 transition-all shadow-inner"/>
            <div id="gameday-suggestions" class="hidden"></div>
        </div>
        <div id="draft-chips-label" class="mb-2 hidden"><p class="text-[10px] uppercase font-black text-zinc-600 mb-2 tracking-widest">Upcoming Squad (Unpaid)</p></div>
        <div id="draft-chips" class="flex flex-wrap gap-2 mb-6 pb-6 border-b border-zinc-900"></div>
        <div id="bulk-payment-list" class="space-y-4"></div>
        <div id="bulk-save-area" class="hidden mt-8">
          <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl mb-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3"><i class="fa-solid fa-ticket text-zinc-500 text-lg"></i><span class="text-[12px] font-black uppercase text-zinc-400 tracking-wider">Venue / Match Fee ($75)</span></div>
            <button id="umpire-toggle" onclick="toggleUmpireFee()" class="w-14 h-7 rounded-full bg-zinc-800 border border-zinc-700 relative transition-colors"><div id="umpire-ball" class="absolute top-1 left-1 w-5 h-5 rounded-full bg-zinc-600 transition-all"></div></button>
          </div>
          <div class="flex justify-between items-center mb-6 px-2"><span class="text-xs font-black uppercase text-zinc-500 italic">Net Take:</span><span id="session-total-display" class="text-3xl font-black text-emerald-500 italic">$0.00</span></div>
          <button onclick="submitBulkPayments()" class="w-full bg-emerald-600 text-white font-black py-7 rounded-3xl active:scale-95 transition-all uppercase tracking-widest italic text-lg shadow-xl">Bowl Over & Save</button>
        </div>
      </div>

      <div id="players" class="screen mt-4">
          <div id="team-pills-ledger" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6 shadow-lg border-t-4 border-t-emerald-500">
              <div class="flex justify-between items-center mb-5"><h2 class="font-black uppercase text-[11px] tracking-widest text-emerald-500 italic">Season Audit</h2><div id="team-season-total" class="text-xs font-black text-white bg-zinc-800 px-4 py-2 rounded-full uppercase"></div></div>
              <div class="audit-grid text-[9px] font-black text-zinc-500 uppercase tracking-tighter mb-4 px-1 border-b border-zinc-800 pb-2"><span>Match</span><span>Fees</span><span>Paid</span><span class="text-right">Net</span></div>
              <div id="team-audit-list" class="space-y-4 max-h-80 overflow-y-auto no-scrollbar"></div>
          </div>
          <input id="ledger-search" type="text" placeholder="Search Players..." oninput="renderPlayersList()" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-4 text-sm mb-4 outline-none focus:border-emerald-500"/>
          <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4 pb-10">
        <div id="admin-setup-area">
            <div class="bg-zinc-900 border border-zinc-800 p-6 mb-6 rounded-3xl shadow-lg border-t-4 border-t-emerald-600">
                <h2 class="font-black mb-5 uppercase text-[11px] tracking-widest text-emerald-500 italic text-center">Season Config</h2>
                <input id="season-input" placeholder="Season Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none mb-3 text-white font-bold text-center"/>
                <div class="flex gap-2 mb-4">
                    <div class="flex-1"><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1">Starts</label><input id="season-start" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300"/></div>
                    <div class="flex-1"><label class="text-[9px] uppercase text-zinc-500 block mb-1 ml-1">Ends</label><input id="season-end" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300"/></div>
                </div>
                <button onclick="handleSeasonUpdate()" class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg">Update Season Window</button>
            </div>
            <div class="flex justify-between items-center mb-4 mt-8 px-1"><h2 class="text-[11px] font-black uppercase italic text-zinc-400 tracking-[0.2em]">Manage Teams</h2><button onclick="showAddTeamModal()" class="text-emerald-500 text-[11px] font-black uppercase tracking-tighter">+ New Team</button></div>
            <div id="setup-team-list" class="flex flex-wrap gap-2 mb-8"></div>
            <div class="flex justify-between items-center mb-4 px-1"><h2 class="text-[11px] font-black uppercase italic text-zinc-400 tracking-[0.2em]">Fixtures</h2></div>
            <div id="setup-fixture-list" class="space-y-2 mb-8"></div>
        </div>
        <div class="bg-zinc-900/30 border-2 border-dashed border-zinc-800 p-6 mt-12 rounded-3xl shadow-lg">
            <div class="flex justify-between items-center mb-6"><h2 class="font-bold uppercase text-[11px] tracking-widest text-zinc-500">Master List</h2><button onclick="showAddPlayerModal()" class="text-emerald-500 text-[11px] font-black uppercase tracking-tighter">+ New Player</button></div>
            <div id="master-players-list" class="space-y-8"></div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md pb-8 pt-4">
      <div id="nav-bar" class="flex text-[11px] max-w-[480px] mx-auto font-black uppercase">
        <button onclick="switchScreen('log')" data-target="log" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-2xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" data-target="players" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-2xl mb-1"></i><span>Ledger</span></button>
        <button id="nav-setup" onclick="switchScreen('teams')" data-target="teams" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-sliders text-2xl mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <div id="player-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[1000]">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 id="modal-title" class="text-xl font-bold mb-6 italic text-emerald-500 uppercase">Profile</h3>
      <div class="space-y-4 text-left">
        <input id="player-first" placeholder="First Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-emerald-500 mb-2"/>
        <input id="player-last" placeholder="Last Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-4 px-4 text-white outline-none focus:border-emerald-500 mb-2"/>
        <select id="player-team-assign" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm outline-none text-zinc-300"></select>
        <div class="flex p-1 bg-zinc-800 rounded-xl border border-zinc-700 mt-2"><button id="btn-member" onclick="setPlayerType(true)" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase text-white">Member</button><button id="btn-casual" onclick="setPlayerType(false)" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase text-white">Casual</button></div>
      </div>
      <div class="flex gap-3 mt-8"><button onclick="hideModal('player-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button><button onclick="savePlayer()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Save</button></div>
      <div id="danger-zone" class="mt-4 pt-4 border-t border-zinc-800 text-center"><button onclick="handleDeleteAction()" class="text-red-500 text-[10px] font-black uppercase tracking-widest">Delete Player</button></div>
    </div>
  </div>

  <div id="history-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[1000] backdrop-blur-md">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[440px] mx-4 p-6 flex flex-col max-h-[90vh]">
      <div class="flex justify-between items-start mb-6 border-b border-zinc-800 pb-4">
        <div><h3 id="history-name" class="text-2xl font-black italic text-emerald-500 uppercase tracking-tighter"></h3><p id="history-balance" class="text-[10px] font-black uppercase text-zinc-500 mt-1 tracking-widest"></p></div>
        <button onclick="hideModal('history-modal')" class="text-zinc-500 h-10 w-10 rounded-full bg-zinc-900 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto space-y-2 pr-1 no-scrollbar"></div>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxDqpgolrUY3RRBf7OzxMIpE6gIi1YgyYPUkBFlxKgpZ3G3IfUKyY6j3mZaTtBp810P/exec";
    let players = [], transactions = [], fixtures = [], teams = [], fixturesSquad = [], config = {}, users = [], currentUser = null, activeTeamId = null, activeFixtureId = null, currentEditId = null, selectedIsMember = true, persistentAmounts = {}, paymentMethods = {}, selectedForPayment = [], umpireFeePaid = false;

    const quotes = ["Marvellous effort that.", "Got him! Yes!", "Morning everyone, Richie here...", "Check the beige jacket.", "Like a tracer bullet!"];

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; if(s) document.getElementById('loader-text').innerText = quotes[Math.floor(Math.random() * quotes.length)]; }
    function formatAUDate(dStr) { if(!dStr) return "N/A"; const d = new Date(dStr); return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }); }
    function updateUI(id, text) { const el = document.getElementById(id); if (el) el.innerText = text; }

    async function handleLogin() {
      const u = document.getElementById('login-user').value.trim().toLowerCase();
      const p = document.getElementById('login-pin').value.trim();
      toggleLoader(true);
      try {
        const res = await fetch(DATABASE_URL + "?action=getData");
        const data = await res.json();
        const found = (data.users || []).find(x => String(x.username).toLowerCase() === u && String(x.pin) === p);
        if (found) { currentUser = found; localStorage.setItem('cp_user', JSON.stringify(found)); document.getElementById('login-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; loadWithUser(data); }
        else alert("Invalid Login.");
      } catch (e) { alert("Sync Error."); }
      toggleLoader(false);
    }

    function logout() { localStorage.removeItem('cp_user'); location.reload(); }
    function loadWithUser(data) {
      players = data.players || []; transactions = data.transactions || []; fixtures = data.fixtures || []; teams = data.teams || []; fixturesSquad = data.fixturesSquad || []; config = data.config || {};
      document.getElementById('user-display').innerText = currentUser.username;
      if (currentUser.role === 'captain') { activeTeamId = currentUser.teamId; document.getElementById('nav-setup').style.display = 'none'; } 
      else { if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id; document.getElementById('nav-setup').style.display = 'flex'; }
      renderAll();
    }

    window.loadData = async function(isSilent = false) {
      if(!isSilent) toggleLoader(true);
      try { const res = await fetch(DATABASE_URL + "?action=getData"); const data = await res.json(); if (currentUser) loadWithUser(data); } catch(e) { if(!isSilent) alert("Sync failed."); }
      if(!isSilent) toggleLoader(false);
    }

    function renderAll() { updateUI('active-season-label', config.CurrentSeason || "No Season"); renderTeamPills(); renderPlayersList(); findCurrentMatch(); renderGamedaySelection(); renderMasterPlayerList(); renderTeamAudit(); renderSetupTeams(); renderSetupFixtures(); populateDropdowns(); }
    
    function renderPlayersList() { 
      const list = document.getElementById('players-list'); const term = document.getElementById('ledger-search')?.value.toLowerCase() || ''; 
      let filtered = players.filter(p => {
          const nameMatch = `${p.firstName} ${p.lastName}`.toLowerCase().includes(term);
          const teamMatch = (currentUser.role === 'admin') ? (p.defaultTeam === activeTeamId) : (p.defaultTeam === currentUser.teamId);
          return nameMatch && teamMatch;
      }); 
      list.innerHTML = filtered.map(p => { const bal = getSafeBalance(p.id); return `<div onclick="showHistory('${p.id}')" class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center mb-1 active:scale-95 transition-all"><div class="flex-1"><div class="font-bold text-zinc-100 text-base">${p.firstName} ${p.lastName}</div></div><div class="text-xl font-black ${bal<0?'text-red-500':'text-emerald-500'} italic">$${bal.toFixed(2)}</div></div>`; }).join(''); 
    }

    function renderGamedaySelection() {
        const chipContainer = document.getElementById('draft-chips');
        const bulkList = document.getElementById('bulk-payment-list');
        const saveArea = document.getElementById('bulk-save-area');
        const label = document.getElementById('draft-chips-label');
        if (!activeFixtureId) { chipContainer.innerHTML = ''; label.classList.add('hidden'); bulkList.innerHTML = `<div class="py-10 text-center text-zinc-800 text-xs font-bold uppercase">No upcoming match</div>`; return; }
        
        const assignedIds = fixturesSquad.filter(s => s.fixtureId === activeFixtureId).map(s => s.playerId);
        const currentMatch = fixtures.find(f => f.id === activeFixtureId);
        const unpaidAvailable = players.filter(p => {
            const hasPaid = transactions.some(t => t.playerId === p.id && t.note.includes(currentMatch.opponent) && t.type === 'payment' && isWithinSeason(t.date));
            return assignedIds.includes(p.id) && !hasPaid;
        });

        label.classList.toggle('hidden', unpaidAvailable.length === 0);
        chipContainer.innerHTML = unpaidAvailable.map(p => `<button onclick="togglePlayerSelection('${p.id}')" class="px-5 py-4 rounded-2xl text-[11px] font-black uppercase border transition-all ${selectedForPayment.includes(p.id) ? 'chip-active' : 'bg-zinc-900 border-emerald-900/30 text-emerald-400'}">${p.firstName.toUpperCase()} ${p.lastName.charAt(0)}.</button>`).join('');

        if (selectedForPayment.length > 0) {
            saveArea.classList.remove('hidden');
            bulkList.innerHTML = selectedForPayment.map(pid => { 
                const p = players.find(x => x.id === pid);
                const method = paymentMethods[pid] || 'Cash';
                const bal = getSafeBalance(pid);
                const feeDue = p.isMember ? 10 : 25;
                const totalDue = (bal < 0) ? (Math.abs(bal) + feeDue) : feeDue;

                if (!persistentAmounts[pid]) persistentAmounts[pid] = totalDue;

                return `<div class="bg-zinc-900 border border-zinc-800 p-5 rounded-3xl flex flex-col gap-4 animate-in fade-in zoom-in duration-200">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-bold text-base text-white">${p.firstName} ${p.lastName}</div>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[9px] font-black uppercase ${bal<0?'text-red-500':'text-zinc-500'}">Prev: $${Math.abs(bal).toFixed(0)}</span>
                                <span class="text-[9px] font-black uppercase text-emerald-500">+ Match: $${feeDue}</span>
                            </div>
                            <div class="text-[10px] font-black uppercase text-zinc-300 mt-1 tracking-tighter">Total Due: $${totalDue.toFixed(0)}</div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                           <div class="pay-method-toggle">
                                <button onclick="setPaymentMethod('${pid}', 'Cash')" class="pay-btn ${method==='Cash'?'cash-active':''}"><i class="fa-solid fa-money-bill-1"></i></button>
                                <button onclick="setPaymentMethod('${pid}', 'Card')" class="pay-btn ${method==='Card'?'card-active':''}"><i class="fa-solid fa-credit-card"></i></button>
                           </div>
                           <button onclick="captureAmount('${pid}', '${feeDue}'); renderGamedaySelection();" class="text-[8px] font-black uppercase bg-zinc-800 border border-zinc-700 px-3 py-1 rounded text-zinc-400 active:scale-95 italic">Fee Only</button>
                        </div>
                    </div>
                    <div class="bg-black/40 px-4 py-3 rounded-xl border border-zinc-800 flex justify-between items-center">
                        <span class="text-[10px] font-black uppercase text-zinc-600 tracking-widest">Collecting</span>
                        <input type="number" id="amt-${pid}" inputmode="decimal" placeholder="0" value="${persistentAmounts[pid]}" oninput="captureAmount('${pid}', this.value)" class="w-24 bg-transparent text-2xl font-black text-emerald-500 outline-none text-right" />
                    </div>
                </div>`;
            }).join('');
            calculateSessionTotal();
        } else { saveArea.classList.add('hidden'); bulkList.innerHTML = unpaidAvailable.length > 0 ? `<div class="py-10 text-center text-zinc-700 text-[11px] uppercase tracking-widest">Select chips above</div>` : `<div class="py-12 text-center text-emerald-500/40 text-xs uppercase italic">Squad Payments Clear</div>`; }
    }

    async function submitBulkPayments() { 
      const fix = fixtures.find(f => f.id === activeFixtureId);
      const payload = { action: "saveSessionTake", teamId: activeTeamId, opponent: fix.opponent, matchDate: fix.date, payments: selectedForPayment.map(pid => ({ playerId: pid, amount: parseFloat(persistentAmounts[pid]) || 0, formattedNote: `${paymentMethods[pid] || 'Cash'} - ${fix.opponent}` })), umpireFee: umpireFeePaid };
      selectedForPayment = []; persistentAmounts = {}; paymentMethods = {}; renderGamedaySelection();
      try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify(payload) }); await window.loadData(true); } catch(e) { alert("Sync Error."); } 
    }

    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); const target = document.getElementById(id); if(target) target.classList.add('active'); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); const btn = document.querySelector(`button[data-target="${id}"]`); if(btn) btn.classList.add('active'); }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
    function setPaymentMethod(pid, method) { paymentMethods[pid] = method; renderGamedaySelection(); }
    function renderTeamPills() { const caps = currentUser?.role === 'captain'; [document.getElementById('team-pills-gameday'), document.getElementById('team-pills-ledger')].forEach(c => { if(!c) return; c.style.display = caps ? 'none' : 'flex'; c.innerHTML = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-6 py-3 rounded-full text-xs font-black uppercase border-2 transition-all ${activeTeamId === t.id ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-zinc-800 text-zinc-600'}">${t.name}</button>`).join(''); }); }
    function findCurrentMatch() { const card = document.getElementById('fixture-card'); if(!activeTeamId || !card) return; const now = new Date(); now.setHours(0,0,0,0); const upcoming = fixtures.filter(f => { const fD = new Date(f.date); fD.setHours(0,0,0,0); return f.teamId === activeTeamId && isWithinSeason(f.date) && fD.getTime() >= now.getTime(); }).sort((a,b) => new Date(a.date) - new Date(b.date)); if(upcoming.length > 0) { const m = upcoming[0]; activeFixtureId = m.id; updateUI('match-vs', "vs " + m.opponent); updateUI('match-details', formatAUDate(m.date)); card.classList.remove('hidden'); } else { activeFixtureId = null; card.classList.add('hidden'); } }
    function toggleUmpireFee() { umpireFeePaid = !umpireFeePaid; const ball = document.getElementById('umpire-ball'); if(umpireFeePaid) { ball.classList.add('translate-x-7'); ball.classList.replace('bg-zinc-600', 'bg-emerald-500'); } else { ball.classList.remove('translate-x-7'); ball.classList.replace('bg-emerald-500', 'bg-zinc-600'); } calculateSessionTotal(); }
    function calculateSessionTotal() { let total = 0; selectedForPayment.forEach(id => total += (parseFloat(persistentAmounts[id]) || 0)); if (umpireFeePaid) total -= 75; document.getElementById('session-total-display').innerText = `$${total.toFixed(2)}`; }
    function togglePlayerSelection(pid) { if (selectedForPayment.includes(pid)) { selectedForPayment = selectedForPayment.filter(id => id !== pid); delete persistentAmounts[pid]; delete paymentMethods[pid]; } else { selectedForPayment.push(pid); paymentMethods[pid] = 'Cash'; } renderGamedaySelection(); }
    function captureAmount(pid, val) { persistentAmounts[pid] = val; calculateSessionTotal(); }
    function renderTeamAudit() { const list = document.getElementById('team-audit-list'); if (!list) return; const teamTx = transactions.filter(t => t.teamId === activeTeamId && isWithinSeason(t.date)); const matchNames = [...new Set(teamTx.filter(t => t.note).map(t => t.note))]; let seasonTotal = 0; list.innerHTML = matchNames.map(mName => { const mTx = teamTx.filter(t => t.note === mName); const fees = Math.abs(mTx.filter(t => t.type === 'match_fee' || t.type === 'expense').reduce((s,t) => s+t.amount, 0)); const paid = mTx.filter(t => t.type === 'payment').reduce((s,t) => s+t.amount, 0); const netProfit = paid - Math.abs(mTx.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0)); seasonTotal += netProfit; return `<div class="audit-grid text-zinc-300 font-bold border-b border-zinc-800 pb-3 text-[11px]"><span>${mName}</span><span class="text-zinc-500">$${fees.toFixed(0)}</span><span class="text-emerald-500">$${paid.toFixed(0)}</span><span class="${netProfit<0?'text-red-500 text-right':'text-emerald-400 text-right'} italic font-black text-xs">$${netProfit.toFixed(0)}</span></div>`; }).join(''); updateUI('team-season-total', `$${seasonTotal.toFixed(0)} NET`); }
    function getSafeBalance(pid) { let tx = transactions.filter(t => String(t.playerId) === String(pid) && isWithinSeason(t.date)); return tx.reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0); }
    function isWithinSeason(dStr) { if (!config.SeasonStart || !config.SeasonEnd) return true; const d = new Date(dStr); const start = new Date(config.SeasonStart); const end = new Date(config.SeasonEnd); return d >= start && d <= end; }
    function renderSetupTeams() { const list = document.getElementById('setup-team-list'); if(!list) return; list.innerHTML = teams.map(t => `<div class="bg-zinc-900 border border-zinc-800 px-5 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-300 flex items-center gap-4">${t.name}</div>`).join(''); }
    function renderSetupFixtures() { const list = document.getElementById('setup-fixture-list'); if(!list) return; let html = ""; teams.forEach(team => { const teamF = fixtures.filter(f => f.teamId === team.id && isWithinSeason(f.date)).sort((a,b) => new Date(a.date)-new Date(b.date)); if(teamF.length > 0) { html += `<div class="team-group-header uppercase">${team.name}</div>`; teamF.forEach(f => { html += `<div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 mb-3 shadow-lg"><div class="font-bold text-sm text-white">vs ${f.opponent}</div><div class="text-[10px] text-emerald-500 font-black">${formatAUDate(f.date)}</div></div>`; }); } }); list.innerHTML = html || `<div class="py-10 text-center text-zinc-700 text-xs font-bold uppercase">No fixtures</div>`; }
    function renderMasterPlayerList() {
        const list = document.getElementById('master-players-list'); if(!list) return; let html = "";
        teams.forEach(team => {
            const teamP = players.filter(p => p.defaultTeam === team.id);
            if (teamP.length > 0) { html += `<div class="mb-6"><div class="team-group-header uppercase !mt-0">${team.name}</div><div class="space-y-2 mt-3">${teamP.map(p => `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center shadow-sm"><div class="flex items-center gap-4"><span class="text-[10px] font-black px-3 py-1 rounded-md border ${p.isMember ? 'bg-emerald-600/10 border-emerald-500/30 text-emerald-500' : 'bg-zinc-800 border-zinc-700 text-zinc-500'} uppercase">${p.isMember ? 'Mem' : 'Cas'}</span><div class="font-bold text-base text-zinc-100">${p.firstName} ${p.lastName}</div></div><button onclick="openEditFromSetup('${p.id}')" class="h-11 w-11 bg-zinc-800 rounded-xl flex items-center justify-center text-zinc-400 active:bg-emerald-600 active:text-white transition-all"><i class="fa-solid fa-pen text-sm"></i></button></div>`).join('')}</div></div>`; }
        });
        list.innerHTML = html || `<div class="text-center py-10 text-zinc-700 italic text-xs uppercase font-bold">No players found</div>`;
    }
    function openEditFromSetup(pid) { currentEditId = pid; const p = players.find(x => x.id === pid); document.getElementById('modal-title').innerText = "Edit Profile"; document.getElementById('player-first').value = p.firstName; document.getElementById('player-last').value = p.lastName; document.getElementById('player-team-assign').value = p.defaultTeam || ""; setPlayerType(p.isMember); document.getElementById('player-modal').classList.remove('hidden'); }
    function showAddPlayerModal() { currentEditId = null; document.getElementById('modal-title').innerText = "New Profile"; document.getElementById('player-first').value = ''; document.getElementById('player-last').value = ''; document.getElementById('player-team-assign').value = activeTeamId || ""; document.getElementById('player-modal').classList.remove('hidden'); }
    async function savePlayer() { const f = document.getElementById('player-first').value.trim(); const l = document.getElementById('player-last').value.trim(); const t = document.getElementById('player-team-assign').value; const id = currentEditId || 'p'+Date.now(); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "savePlayer", id, firstName: f, lastName: l, isMember: selectedIsMember, defaultTeam: t }) }); hideModal('player-modal'); await window.loadData(); } catch(e) { } toggleLoader(false); }
    async function handleDeleteAction() { if (!currentEditId) return; if (!confirm("Delete this player?")) return; toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "deletePlayer", id: currentEditId }) }); hideModal('player-modal'); await window.loadData(); } catch(e) { } toggleLoader(false); }
    function setPlayerType(m) { selectedIsMember = m; document.getElementById('btn-member').className = m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold text-sm' : 'flex-1 py-3 rounded-lg text-zinc-500 font-bold text-sm'; document.getElementById('btn-casual').className = !m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white font-bold text-sm' : 'flex-1 py-3 rounded-lg text-zinc-500 font-bold text-sm'; }
    function populateDropdowns() { const html = teams.map(t => `<option value="${t.id}">${t.name}</option>`).join(''); if(document.getElementById('player-team-assign')) document.getElementById('player-team-assign').innerHTML = '<option value="">No Team Assigned</option>' + html; }
    function showHistory(pid) { currentEditId = pid; const p = players.find(x => x.id === pid); const bal = getSafeBalance(pid); let history = [...transactions.filter(t => String(t.playerId) === String(pid) && isWithinSeason(t.date))].reverse(); document.getElementById('history-name').innerText = p.firstName + " " + p.lastName; document.getElementById('history-balance').innerText = "Balance: $" + bal.toFixed(2); const list = document.getElementById('history-list'); list.innerHTML = history.length > 0 ? history.map(t => `<div class="bg-zinc-800/40 p-5 rounded-2xl border border-zinc-800 flex justify-between mb-2 shadow-inner"><div><div class="text-[10px] uppercase text-zinc-500 font-bold">${t.type}</div><div class="text-sm font-bold text-zinc-200">${t.note}</div></div><div class="text-base font-black ${parseFloat(t.amount)<0?'text-red-400':'text-emerald-400'}">${parseFloat(t.amount)<0?'-':'+'}$${Math.abs(parseFloat(t.amount)).toFixed(2)}</div></div>`).join('') : `<div class="py-12 text-center opacity-30 text-xs font-black uppercase tracking-widest">No History</div>`; document.getElementById('history-modal').classList.remove('hidden'); }
    async function handleSeasonUpdate() { const n = document.getElementById('season-input').value.trim(); const s = document.getElementById('season-start').value; const e = document.getElementById('season-end').value; if(!n||!s||!e) return alert("Fill fields"); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "updateSeason", name: n, start: s, end: e }) }); await window.loadData(); } catch(e) { } toggleLoader(false); }
    function showAddTeamModal() { document.getElementById('team-name-input').value = ""; document.getElementById('team-modal').classList.remove('hidden'); }
    async function saveTeam() { const name = document.getElementById('team-name-input').value.trim(); if(!name) return alert("Required."); const id = 't' + Date.now(); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "saveTeam", id, name }) }); hideModal('team-modal'); await window.loadData(); } catch(e) { } toggleLoader(false); }

    const saved = localStorage.getItem('cp_user');
    if (saved) { currentUser = JSON.parse(saved); document.getElementById('login-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; window.loadData(); }
    else { document.getElementById('login-screen').style.display = 'flex'; }
  </script>
</body>
</html>
