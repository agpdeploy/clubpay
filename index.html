<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v0.90</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .audit-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 8px; font-size: 10px; }
  </style>
  <script>
    function tryLogin() {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        if (typeof window.loadData === 'function') window.loadData();
    }
  </script>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-bolt"></i></div>
    <div id="loader-text" class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic">Syncing Kernel...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase text-white">v0.90 Stable</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-widest text-sm">Enter</button>
    </div>
  </div>

  <div id="app" class="hidden flex flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950">
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 uppercase">ClubPay</h1>
        <p id="active-season-label" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">---</p>
      </div>
      <button onclick="loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900"><i class="fa-solid fa-rotate"></i></button>
    </header>

    <div id="system-error" class="hidden m-4 p-4 bg-red-950 border border-red-500 rounded-xl text-red-200 text-xs font-mono overflow-auto"></div>

    <main class="flex-1 overflow-y-auto pb-32 px-4">
      <div id="players" class="screen active mt-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6 shadow-lg border-t-4 border-t-emerald-500">
            <h2 class="font-black uppercase text-[10px] tracking-widest text-emerald-500 italic mb-4">Team Audit</h2>
            <div id="team-audit-list" class="space-y-3"></div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6 text-center">
            <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800"><div id="club-total-debt" class="text-xl font-black text-red-500">$0</div></div>
            <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800"><div id="club-total-credit" class="text-xl font-black text-emerald-500">$0</div></div>
        </div>
        <div id="players-list" class="space-y-2"></div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 py-2">
      <div class="flex text-[10px] font-black uppercase text-zinc-400">
        <button onclick="alert('Use Gameday to log matches')" class="flex-1 flex flex-col items-center"><i class="fa-solid fa-bolt text-xl mb-1"></i><span>Gameday</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
      </div>
    </nav>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";
    let players = [], transactions = [], fixtures = [], teams = [], config = {};
    let activeTeamId = null, viewSeason = 'current';

    window.loadData = async function() {
        const loader = document.getElementById('loader');
        const errBox = document.getElementById('system-error');
        loader.style.display = 'flex';
        errBox.classList.add('hidden');
        
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            players = data.players || [];
            transactions = data.transactions || [];
            config = data.config || { CurrentSeason: "All" };
            
            renderAll();
        } catch (e) {
            errBox.innerText = "CRITICAL ERROR: " + e.message;
            errBox.classList.remove('hidden');
        } finally {
            loader.style.display = 'none';
        }
    };

    function renderAll() {
        document.getElementById('active-season-label').innerText = config.CurrentSeason;
        const list = document.getElementById('players-list');
        list.innerHTML = players.map(p => {
            const bal = transactions.filter(t => String(t.playerId) === String(p.id)).reduce((s, t) => s + t.amount, 0);
            return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-1">
                <div><div class="font-bold text-sm">${p.firstName} ${p.lastName}</div></div>
                <div class="text-lg font-black ${bal < 0 ? 'text-red-500' : 'text-emerald-500'}">$${bal.toFixed(2)}</div>
            </div>`;
        }).join('');
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
