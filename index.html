<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v0.60</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-4xl text-emerald-500 mb-4"><i class="fa-solid fa-circle-notch"></i></div>
    <div class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic">Syncing Cloud...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase italic text-white">ClubPay 0.60</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Open Dashboard</button>
    </div>
  </div>

  <div id="app" class="hidden flex flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950">
    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 tracking-tighter uppercase text-6xl">CP</h1>
        <p id="today-date" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest"></p>
      </div>
      <button onclick="loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-4">
      
      <div id="log" class="screen active mt-4">
        <div id="team-pills" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 mb-6 hidden">
            <h2 id="match-vs" class="text-lg font-black italic text-emerald-400"></h2>
            <p id="match-details" class="text-xs text-zinc-400 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2 mb-4">
            <input id="gameday-search" type="text" placeholder="Add player to match..." oninput="showGamedaySuggestions()" class="flex-1 bg-zinc-900 border-2 border-zinc-800 rounded-2xl px-4 py-4 text-lg outline-none focus:border-emerald-500 transition-all"/>
            <button onclick="showAddPlayerModal('gameday')" class="bg-zinc-900 border-2 border-emerald-900/20 w-16 rounded-2xl text-emerald-500 flex items-center justify-center"><i class="fa-solid fa-user-plus text-xl"></i></button>
            <div id="gameday-suggestions" class="hidden absolute z-50 left-4 right-4 mt-16 bg-zinc-900 border border-zinc-700 rounded-2xl max-h-60 overflow-auto shadow-2xl"></div>
        </div>
        <div id="squad-suggestions-area" class="hidden mb-6"><div id="squad-chips" class="flex flex-wrap gap-2"></div></div>
        <div id="gameday-list" class="space-y-3"></div>
        <div id="finalize-area" class="hidden mt-8 pt-6 border-t border-zinc-800">
            <button onclick="confirmGameday()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform uppercase tracking-widest text-sm italic">Sync Results</button>
        </div>
      </div>

      <div id="players" class="screen mt-4">
        <div class="grid grid-cols-2 gap-3 mb-6 text-center">
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-md border-l-4 border-l-red-500">
                <div class="text-[9px] font-bold text-zinc-500 uppercase mb-1">Total Debt</div>
                <div id="club-total-debt" class="text-xl font-black text-red-500">-$0.00</div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-md border-l-4 border-l-emerald-500">
                <div class="text-[9px] font-bold text-zinc-500 uppercase mb-1">In Credit</div>
                <div id="club-total-credit" class="text-xl font-black text-emerald-500">$0.00</div>
            </div>
        </div>
        <div class="flex bg-zinc-900 p-1 rounded-xl mb-4 border border-zinc-800">
            <button onclick="setLedgerFilter('all')" id="filter-all" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all bg-emerald-600">All</button>
            <button onclick="setLedgerFilter('debt')" id="filter-debt" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all text-zinc-500">Debtors</button>
        </div>
        <input id="ledger-search" type="text" placeholder="Search Master Ledger..." oninput="renderPlayersList()" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 mb-4 outline-none focus:border-emerald-500"/>
        <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4 pb-10">
        <div class="bg-zinc-900 border border-zinc-800 p-5 mb-6 rounded-3xl shadow-lg">
            <h2 class="font-bold mb-4 uppercase text-[10px] tracking-widest text-zinc-500 italic">Fixture Management</h2>
            <div class="space-y-4">
                <select id="fix-team-select" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm outline-none text-zinc-300"></select>
                <input id="fix-opponent" placeholder="vs Opponent..." class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none"/>
                <input id="fix-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none text-zinc-400"/>
                <button onclick="handleFixtureAdd()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg">+ Add Match</button>
            </div>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-3xl shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold uppercase text-[10px] tracking-widest text-zinc-500">Master Players</h2>
                <button onclick="showAddPlayerModal('setup')" class="text-emerald-500 text-[10px] font-black uppercase tracking-tighter">+ New Player</button>
            </div>
            <div id="master-players-list" class="space-y-2"></div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
        <button onclick="switchScreen('teams')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-sliders text-xl mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <div id="player-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] backdrop-blur-sm">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 id="modal-title" class="text-xl font-bold mb-6 italic text-emerald-500 uppercase">Profile</h3>
      <div class="space-y-4">
        <input id="player-first" placeholder="First Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <input id="player-last" placeholder="Last Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <select id="player-team-assign" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm outline-none text-zinc-300"></select>
        <div class="flex p-1 bg-zinc-800 rounded-xl border border-zinc-700">
            <button id="btn-member" onclick="setPlayerType(true)" class="flex-1 py-3 rounded-lg text-xs font-bold transition-all uppercase">Member</button>
            <button id="btn-casual" onclick="setPlayerType(false)" class="flex-1 py-3 rounded-lg text-xs font-bold transition-all uppercase">Casual</button>
        </div>
      </div>
      <div class="flex gap-3 mt-8">
        <button onclick="hideModal('player-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button>
        <button onclick="savePlayer()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Save Profile</button>
      </div>
      <button id="btn-delete-player" onclick="deletePlayer()" class="hidden w-full mt-4 py-2 text-red-500 text-[10px] font-bold uppercase opacity-50">Wipe Data</button>
    </div>
  </div>

  <div id="history-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] backdrop-blur-md">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[400px] mx-4 p-6 flex flex-col max-h-[85vh] shadow-2xl">
      <div class="flex justify-between items-start mb-6 border-b border-zinc-800 pb-4">
        <div><h3 id="history-name" class="text-xl font-bold italic text-emerald-500 uppercase tracking-tighter text-6xl"></h3><p id="history-balance" class="text-[10px] font-black uppercase text-zinc-500 mt-1 tracking-widest"></p></div>
        <div class="flex gap-2">
          <button onclick="startEditFromHistory()" class="text-zinc-400 h-10 w-10 rounded-full bg-zinc-800 flex items-center justify-center active:bg-zinc-700"><i class="fa-solid fa-pen-to-square"></i></button>
          <button onclick="hideModal('history-modal')" class="text-zinc-500 h-10 w-10 rounded-full bg-zinc-900 flex items-center justify-center active:bg-zinc-700"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto space-y-2 pr-1 no-scrollbar"></div>
      <button onclick="hideModal('history-modal')" class="mt-6 w-full py-4 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase tracking-widest text-zinc-400">Back</button>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";
    let players = [], transactions = [], fixtures = [], teams = [];
    let gamedaySquad = [], activeTeamId = null, ledgerFilter = 'all', currentMatch = null, selectedIsMember = true, modalSource = 'setup', currentEditId = null;

    // --- NAVIGATION ---
    function tryLogin() { document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); switchScreen('log'); loadData(); }
    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); const btn = document.querySelector(`button[onclick="switchScreen('${id}')"]`); if(btn) btn.classList.add('active'); }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

    // --- CLOUD SYNC ---
    async function loadData() {
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players || [];
            transactions = data.transactions || [];
            fixtures = data.fixtures || [];
            teams = data.teams || [];
            if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id;
            renderAll();
        } catch (e) { alert("Cloud Sync Failed."); }
        toggleLoader(false);
    }

    function renderAll() {
        renderTeamPills();
        renderPlayersList();
        renderGameday();
        renderMasterPlayerList();
        updateClubDebt();
        renderSquadChips();
        findCurrentMatch();
        populateDropdowns();
        document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    // --- GAMEDAY LOGIC ---
    function showGamedaySuggestions() {
        const term = document.getElementById('gameday-search').value.toLowerCase();
        const sug = document.getElementById('gameday-suggestions');
        if(!term) { sug.classList.add('hidden'); return; }
        const filtered = players.filter(p => !gamedaySquad.some(s => s.id === p.id) && (p.firstName + " " + p.lastName).toLowerCase().includes(term));
        sug.innerHTML = filtered.map(p => `<div onclick="addToGameday('${p.id}')" class="p-4 border-b border-zinc-800 active:bg-zinc-800 flex justify-between items-center transition-colors"><div><div class="font-bold text-sm text-zinc-200">${p.firstName} ${p.lastName}</div><div class="text-[9px] text-zinc-500 uppercase font-black">Credit: $${getSafeBalance(p.id).toFixed(2)}</div></div><div class="text-emerald-500 text-xs font-bold">+ Add</div></div>`).join('');
        sug.classList.remove('hidden');
    }

    function addToGameday(id) { const p = players.find(x => x.id === id); if(!p) return; gamedaySquad.push({...p, paidToday: 0, payMethod: 'Cash'}); document.getElementById('gameday-search').value = ''; document.getElementById('gameday-suggestions').classList.add('hidden'); renderAll(); }

    function renderGameday() {
        const list = document.getElementById('gameday-list');
        document.getElementById('finalize-area').classList.toggle('hidden', gamedaySquad.length === 0);
        list.innerHTML = gamedaySquad.map(p => {
            const bal = getSafeBalance(p.id); const fee = p.isMember ? 10 : 25; const net = bal - fee;
            let statusHtml = bal >= fee ? `<span class="text-emerald-500 font-bold text-[9px] uppercase tracking-tighter">Paid ($${bal.toFixed(2)} Credit)</span>` : `<span class="text-red-500 font-black italic text-[9px] uppercase tracking-tighter">Owes $${Math.abs(net).toFixed(2)}</span>`;
            return `<div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 flex flex-col gap-4 shadow-xl border-l-4 ${bal >= fee ? 'border-l-emerald-500' : 'border-l-red-500'}"><div class="flex justify-between items-center"><div><div class="font-bold text-zinc-100 text-sm">${p.firstName} ${p.lastName}</div><div class="mt-1">${statusHtml}</div></div><button onclick="gamedaySquad = gamedaySquad.filter(x=>x.id!=='${p.id}'); renderAll();" class="text-zinc-700 h-10 w-10 rounded-full bg-zinc-800 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button></div><div class="bg-black/40 p-3 rounded-2xl border border-zinc-800 flex items-center justify-between gap-3 shadow-inner"><div class="flex-1"><label class="text-[8px] uppercase text-zinc-500 block font-black mb-1 italic">Paid Today ($)</label><input type="number" placeholder="0" oninput="gamedaySquad.find(x=>x.id==='${p.id}').paidToday = parseFloat(this.value)||0" class="w-full bg-transparent font-black text-2xl text-emerald-500 outline-none px-1" /></div><button onclick="const x=gamedaySquad.find(y=>y.id==='${p.id}'); x.payMethod=x.payMethod==='Cash'?'Card':'Cash'; renderGameday();" class="text-[10px] bg-zinc-800 border border-zinc-700 px-4 py-2 rounded-xl font-black uppercase text-zinc-400">${p.payMethod}</button></div></div>`}).join('');
    }

    async function confirmGameday() {
        if(!activeTeamId) return alert('Select Team');
        toggleLoader(true);
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logMatch", teamId: activeTeamId, squad: gamedaySquad, opponent: currentMatch ? currentMatch.opponent : "Match Day" }) });
            gamedaySquad = []; await loadData(); alert("Match Results Synced!");
        } catch(e) { alert("Sync Error."); }
        toggleLoader(false);
    }

    // --- SETUP / PLAYER ACTIONS ---
    function showAddPlayerModal(source) { modalSource = source; currentEditId = null; document.getElementById('modal-title').innerText = "New Profile"; document.getElementById('player-first').value = ''; document.getElementById('player-last').value = ''; document.getElementById('player-team-assign').value = activeTeamId || ""; document.getElementById('btn-delete-player').classList.add('hidden'); setPlayerType(true); document.getElementById('player-modal').classList.remove('hidden'); }

    async function savePlayer() {
        const f = document.getElementById('player-first').value.trim();
        const l = document.getElementById('player-last').value.trim();
        const t = document.getElementById('player-team-assign').value;
        if(!f || !l) return alert("Names required");
        const pid = currentEditId || 'p' + Date.now();
        toggleLoader(true);
        try {
            await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "savePlayer
