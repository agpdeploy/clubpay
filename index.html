<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v1.05 RECOVERY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
  </style>
  <script>
    function tryLogin() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if (window.loadData) window.loadData();
    }
  </script>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-database"></i></div>
    <div id="loader-text" class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic">Forcing Data Load...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase text-white">v1.05 Recovery</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl uppercase tracking-widest text-sm">Enter Dashboard</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl">
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80">
      <h1 class="text-xl font-black italic text-emerald-500 uppercase">ClubPay</h1>
      <button onclick="window.loadData()" class="text-emerald-500"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-4">
      <div id="log" class="screen active mt-4">
        <p class="text-zinc-500 text-[10px] uppercase font-black mb-4 text-center">Emergency Recovery Mode: Filters Disabled</p>
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        <div id="gameday-list" class="space-y-3"></div>
      </div>

      <div id="players" class="screen mt-4">
        <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4 pb-10">
          <div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800">
              <h2 class="font-black text-emerald-500 uppercase text-[10px] mb-4">Master Player Check</h2>
              <div id="master-players-list" class="space-y-2"></div>
          </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 py-2">
      <div class="flex text-[10px] font-black uppercase text-zinc-400">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center"><i class="fa-solid fa-bolt mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center"><i class="fa-solid fa-wallet mb-1"></i><span>Ledger</span></button>
        <button onclick="switchScreen('teams')" class="flex-1 flex flex-col items-center"><i class="fa-solid fa-sliders mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";
    let players = [], transactions = [], teams = [];

    window.loadData = async function() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players || [];
            transactions = data.transactions || [];
            teams = data.teams || [];
            renderAll();
        } catch (e) { alert("Sync Error."); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderAll() {
        const list = document.getElementById('players-list');
        list.innerHTML = players.map(p => {
            const bal = transactions.filter(t => String(t.playerId) === String(p.id)).reduce((s, t) => s + t.amount, 0);
            return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-1">
                <div class="font-bold text-sm">${p.firstName} ${p.lastName}</div>
                <div class="text-lg font-black ${bal < 0 ? 'text-red-500' : 'text-emerald-500'}">$${bal.toFixed(2)}</div>
            </div>`;
        }).join('');

        const master = document.getElementById('master-players-list');
        master.innerHTML = players.map(p => `<div class="p-2 border-b border-zinc-800 text-xs">${p.firstName} ${p.lastName} (ID: ${p.id})</div>`).join('');
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
