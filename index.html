<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏏 ClubPay v1.21</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav-item.active { color: #22c55e !important; border-top: 3px solid #22c55e; }
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    #gameday-suggestions { position: fixed; background: #18181b; border: 2px solid #3f3f46; border-radius: 1rem; max-height: 250px; overflow-y: auto; z-index: 2000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
    .chip-active { background: #059669 !important; color: white !important; border-color: #10b981 !important; }
  </style>

  <script>
    function tryLogin() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if (window.loadData) window.loadData();
    }
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const t = document.getElementById(id); if(t) t.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`button[onclick*="${id}"]`); if(btn) btn.classList.add('active');
    }
    function hideKeyboard() { document.activeElement.blur(); }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin text-5xl text-emerald-500 mb-6"><i class="fa-solid fa-sync"></i></div>
    <div id="loader-text" class="text-[10px] font-black uppercase tracking-widest text-emerald-500 italic text-center px-4">Processing...</div>
  </div>

  <div id="login" class="fixed inset-0 bg-black flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-800 text-center shadow-2xl">
      <div class="text-7xl mb-4 text-emerald-500 font-black italic">CP</div>
      <h1 class="text-2xl font-bold mb-6 tracking-tight uppercase italic text-white">ClubPay 1.21</h1>
      <button onclick="tryLogin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Enter Dashboard</button>
    </div>
  </div>

  <div id="app" style="display:none;" class="flex-col min-h-screen mx-auto max-w-[480px] bg-zinc-950 shadow-2xl">
    <header class="sticky top-0 p-4 border-b border-zinc-800 flex justify-between items-center bg-black/80 backdrop-blur-md z-40">
      <div>
        <h1 class="text-xl font-black italic text-emerald-500 uppercase tracking-tighter">ClubPay</h1>
        <p id="active-season-label" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest"></p>
      </div>
      <button onclick="window.loadData()" class="text-emerald-500 w-10 h-10 rounded-full bg-zinc-900 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4">
      
      <div id="log" class="screen active mt-4">
        <div id="team-pills-gameday" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
        
        <div id="fixture-card" class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 mb-4 hidden">
            <h2 id="match-vs" class="text-lg font-black italic text-emerald-400"></h2>
            <p id="match-details" class="text-xs text-zinc-400 font-bold uppercase"></p>
        </div>

        <div class="mb-4 relative">
            <input id="gameday-search" type="text" autocomplete="off" placeholder="Add late ring-in..." oninput="showGamedaySuggestions()" class="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl px-4 py-4 text-lg outline-none focus:border-emerald-500 transition-all shadow-inner"/>
            <div id="gameday-suggestions" class="hidden"></div>
        </div>

        <div class="mb-2 flex justify-between items-end">
            <p class="text-[8px] uppercase font-black text-zinc-600 tracking-widest">Select Players to Pay</p>
            <button onclick="clearBulkDraft()" class="text-[8px] uppercase font-black text-emerald-500">Reset Selection</button>
        </div>
        <div id="draft-chips" class="flex flex-wrap gap-2 mb-6 pb-6 border-b border-zinc-900"></div>

        <div id="bulk-payment-list" class="space-y-3"></div>
        
        <div id="bulk-save-area" class="hidden mt-8">
            <button onclick="submitBulkPayments()" class="w-full bg-emerald-600 text-white font-black py-6 rounded-3xl active:scale-95 transition-all uppercase tracking-widest italic shadow-xl">
                Save Selected Payments
            </button>
        </div>
      </div>

      <div id="players" class="screen mt-4">
          <div id="team-pills-ledger" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6 shadow-lg border-t-4 border-t-emerald-500">
              <div id="team-season-total" class="text-xs font-black text-white text-right mb-2"></div>
              <div id="team-audit-list" class="space-y-3 max-h-48 overflow-y-auto no-scrollbar"></div>
          </div>
          <input id="ledger-search" type="text" placeholder="Search Players..." oninput="renderPlayersList()" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 mb-4 outline-none focus:border-emerald-500"/>
          <div id="players-list" class="space-y-2"></div>
      </div>

      <div id="teams" class="screen mt-4 pb-10">
        <div class="bg-zinc-900 border border-zinc-800 p-5 mb-6 rounded-3xl shadow-lg border-t-4 border-t-emerald-600">
            <h2 class="font-black mb-4 uppercase text-[10px] tracking-widest text-emerald-500 italic text-center">Config</h2>
            <input id="season-input" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 outline-none text-zinc-100 font-bold mb-4 text-center"/>
            <button onclick="handleSeasonUpdate()" class="w-full bg-emerald-600 py-3 rounded-xl font-black uppercase text-[10px]">Save Season</button>
        </div>
        <div id="setup-fixture-list" class="space-y-2"></div>
        <div class="bg-zinc-900 border border-zinc-800 p-5 mt-8 rounded-3xl shadow-lg">
            <div class="flex justify-between items-center mb-4"><h2 class="font-bold uppercase text-[10px] tracking-widest text-zinc-500">Master Player List</h2><button onclick="showAddPlayerModal()" class="text-emerald-500 text-[10px] font-black uppercase">+ New Player</button></div>
            <div id="master-players-list" class="space-y-2"></div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-black/95 backdrop-blur-md z-50 text-zinc-400">
      <div class="flex text-[10px] max-w-[480px] mx-auto font-black uppercase py-2">
        <button onclick="switchScreen('log')" class="flex-1 flex flex-col items-center nav-item active"><i class="fa-solid fa-bolt-lightning text-xl mb-1"></i><span>GameDay</span></button>
        <button onclick="switchScreen('players')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>Ledger</span></button>
        <button onclick="switchScreen('teams')" class="flex-1 flex flex-col items-center nav-item"><i class="fa-solid fa-sliders text-xl mb-1"></i><span>Setup</span></button>
      </div>
    </nav>
  </div>

  <div id="squad-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] backdrop-blur-md">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[400px] mx-4 p-6 flex flex-col max-h-[85vh] shadow-2xl">
      <h3 class="text-xl font-black italic text-emerald-500 uppercase mb-4">Draft Match Squad</h3>
      <div id="fixture-squad-picker" class="flex-1 overflow-y-auto space-y-2 no-scrollbar px-1"></div>
      <div class="flex gap-3 mt-6">
          <button onclick="hideModal('squad-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button>
          <button onclick="saveFixtureSquad()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Confirm Squad</button>
      </div>
    </div>
  </div>

  <div id="player-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] backdrop-blur-sm">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-[360px] mx-4 p-6 shadow-2xl">
      <h3 id="modal-title" class="text-xl font-bold mb-6 italic text-emerald-500 uppercase">Profile</h3>
      <div class="space-y-4">
        <input id="player-first" placeholder="First Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <input id="player-last" placeholder="Last Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none"/>
        <select id="player-team-assign" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm outline-none text-zinc-300"></select>
        <div class="flex p-1 bg-zinc-800 rounded-xl border border-zinc-700"><button id="btn-member" onclick="setPlayerType(true)" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase">Member</button><button id="btn-casual" onclick="setPlayerType(false)" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase">Casual</button></div>
      </div>
      <div class="flex gap-3 mt-8"><button onclick="hideModal('player-modal')" class="flex-1 py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button><button onclick="savePlayer()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase text-[10px]">Save</button></div>
      <div id="danger-zone" class="hidden mt-6 pt-6 border-t border-red-900/30 text-center"><button onclick="handleDeleteAction()" class="w-full py-3 text-red-500 border border-red-900/40 rounded-xl text-[10px] font-black uppercase">Delete Permanently</button></div>
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzBp716p5vketEu9VIYlVdX8D9Vapxrxo3Sd-ywwgdGM8hLNOAcup5A7EqcXVAVMmGc/exec";
    let players = [], transactions = [], fixtures = [], teams = [], fixturesSquad = [], config = {};
    let activeTeamId = null, activeFixtureId = null, viewSeason = 'all', currentEditId = null, selectedIsMember = true;
    let selectedForPayment = []; // Array of IDs currently toggled "on"
    let sessionProcessedIds = []; // Array of IDs saved in this specific browser session

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function formatAUDate(dStr) { if(!dStr) return "N/A"; const d = new Date(dStr); return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }); }

    window.loadData = async function() {
        toggleLoader(true);
        try {
            const res = await fetch(DATABASE_URL + "?action=getData");
            const data = await res.json();
            players = data.players || []; transactions = data.transactions || []; fixtures = data.fixtures || []; 
            teams = data.teams || []; fixturesSquad = data.fixturesSquad || []; config = data.config || { CurrentSeason: "Winter 2026" };
            if(!activeTeamId && teams.length > 0) activeTeamId = teams[0].id;
            renderAll();
        } catch (e) { alert("Sync Error."); }
        toggleLoader(false);
    }

    function getSafeBalance(pid) {
        return transactions.filter(t => String(t.playerId) === String(pid)).reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
    }

    function renderAll() {
        document.getElementById('active-season-label').innerText = config.CurrentSeason;
        renderTeamPills(); renderPlayersList(); renderGamedaySelection(); renderMasterPlayerList(); renderSetupFixtures(); renderTeamAudit(); findCurrentMatch();
    }

    function renderGamedaySelection() {
        const chipContainer = document.getElementById('draft-chips');
        const bulkList = document.getElementById('bulk-payment-list');
        const saveArea = document.getElementById('bulk-save-area');

        // 1. Get everyone in the squad who HASN'T paid yet in this session
        const assignedIds = fixturesSquad.filter(s => s.fixtureId === activeFixtureId).map(s => s.playerId);
        const available = players.filter(p => assignedIds.includes(p.id) && !sessionProcessedIds.includes(p.id));

        // 2. Render Chips (Multi-Select)
        chipContainer.innerHTML = available.map(p => {
            const isActive = selectedForPayment.includes(p.id);
            return `<button onclick="togglePlayerSelection('${p.id}')" class="px-4 py-3 rounded-2xl text-[10px] font-black uppercase border transition-all ${isActive ? 'chip-active' : 'bg-zinc-900 border-emerald-900/30 text-emerald-400'}">
                ${p.firstName}
            </button>`;
        }).join('');

        // 3. Render Input List for Selected Players
        if (selectedForPayment.length > 0) {
            saveArea.classList.remove('hidden');
            bulkList.innerHTML = selectedForPayment.map(pid => {
                const p = players.find(x => x.id === pid);
                const bal = getSafeBalance(pid);
                return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl shadow-xl flex items-center gap-4">
                    <div class="flex-1">
                        <div class="font-bold text-sm text-white">${p.firstName} ${p.lastName}</div>
                        <div class="text-[9px] text-zinc-500 uppercase font-black">Bal: $${bal.toFixed(2)}</div>
                    </div>
                    <div class="bg-black/40 px-3 py-2 rounded-xl border border-zinc-800">
                        <input type="number" id="amt-${pid}" inputmode="decimal" placeholder="0" class="w-20 bg-transparent text-xl font-black text-emerald-500 outline-none text-right" />
                    </div>
                </div>`;
            }).join('');
        } else {
            saveArea.classList.add('hidden');
            bulkList.innerHTML = `<div class="py-10 text-center text-zinc-700 text-[10px] font-bold uppercase tracking-widest">Tap chips above to enter payments</div>`;
        }
    }

    function togglePlayerSelection(pid) {
        if (selectedForPayment.includes(pid)) selectedForPayment = selectedForPayment.filter(id => id !== pid);
        else selectedForPayment.push(pid);
        renderGamedaySelection();
    }

    function clearBulkDraft() {
        selectedForPayment = [];
        renderGamedaySelection();
    }

    async function submitBulkPayments() {
        if (selectedForPayment.length === 0) return;
        toggleLoader(true);
        try {
            const opp = document.getElementById('match-vs').innerText.replace('vs ','');
            for (const pid of selectedForPayment) {
                const amt = parseFloat(document.getElementById(`amt-${pid}`).value) || 0;
                if (amt > 0) {
                    await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "logPaymentOnly", playerId: pid, amount: amt, teamId: activeTeamId, opponent: opp }) });
                }
                sessionProcessedIds.push(pid); // Hide from list for this session
            }
            selectedForPayment = [];
            await window.loadData(); // Update all balances
            alert("Payments Recorded!");
        } catch(e) { alert("Batch Save Error"); }
        toggleLoader(false);
    }

    // (Everything else remains identical to v1.20 to ensure no feature loss)
    function renderSetupFixtures() { const list = document.getElementById('setup-fixture-list'); list.innerHTML = `<div class="mb-4 text-[10px] font-black uppercase text-zinc-500 tracking-widest text-center">Fixture List</div>` + fixtures.sort((a,b) => new Date(a.date)-new Date(b.date)).map(f => { const t = teams.find(x => x.id === f.teamId)?.name || 'Unknown'; return `<div class="bg-zinc-900 p-4 rounded-3xl border border-zinc-800 flex justify-between items-center mb-3"><div><div class="text-[8px] uppercase font-black text-zinc-600">${t}</div><div class="font-bold text-xs">vs ${f.opponent}</div></div><div class="flex gap-2"><button onclick="openSquadSelector('${f.id}')" class="bg-emerald-600/10 text-emerald-500 text-[8px] font-black px-4 py-2 rounded-xl border border-emerald-900/30">Squad</button><button onclick="closeMatchAdmin('${f.id}')" class="bg-red-900/10 text-red-500 text-[8px] font-black px-4 py-2 rounded-xl border border-red-900/30 text-center">Close<br>Game</button></div></div>`; }).join(''); }
    async function closeMatchAdmin(fid) { const fix = fixtures.find(x => x.id === fid); if(!confirm(`Charge drafted players for vs ${fix.opponent}?`)) return; const squad = fixturesSquad.filter(s => s.fixtureId === fid).map(s => players.find(p => p.id === s.playerId)); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "closeMatchFees", teamId: fix.teamId, squad: squad, opponent: fix.opponent }) }); await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "saveFixtureSquad", fixtureId: fid, playerIds: [] }) }); await window.loadData(); alert("Fees Applied."); } catch(e) { alert("Admin Error."); } toggleLoader(false); }
    function renderTeamPills() { const cs = [document.getElementById('team-pills-gameday'), document.getElementById('team-pills-ledger')]; cs.forEach(c => { if(c) c.innerHTML = teams.map(t => `<button onclick="activeTeamId='${t.id}'; renderAll();" class="px-5 py-2 rounded-full whitespace-nowrap text-[10px] font-black uppercase border-2 transition-all ${activeTeamId === t.id ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-zinc-800 text-zinc-600'}">${t.name}</button>`).join(''); }); }
    function renderPlayersList() { const list = document.getElementById('players-list'); if(!list) return; const term = document.getElementById('ledger-search')?.value.toLowerCase() || ''; let filtered = players.filter(p => p.defaultTeam === activeTeamId && `${p.firstName} ${p.lastName}`.toLowerCase().includes(term)); list.innerHTML = filtered.map(p => { const bal = getSafeBalance(p.id); return `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-1"><div><div class="font-bold text-zinc-100 text-sm">${p.firstName} ${p.lastName}</div></div><div class="text-lg font-black ${bal<0?'text-red-500':'text-emerald-500'} italic">$${bal.toFixed(2)}</div></div>`; }).join(''); }
    function renderTeamAudit() { const list = document.getElementById('team-audit-list'); if (!list) return; const teamSeasonTx = transactions.filter(t => t.teamId === activeTeamId); const matches = [...new Set(teamSeasonTx.filter(t => t.type === 'match_fee').map(t => t.note))]; list.innerHTML = matches.map(mName => { const mTx = teamSeasonTx.filter(t => t.note === mName); const due = Math.abs(mTx.filter(t => t.type === 'match_fee').reduce((s,t) => s+t.amount, 0)); const paid = mTx.filter(t => t.type === 'payment').reduce((s,t) => s+t.amount, 0); return `<div class="audit-grid text-zinc-300 font-bold border-b border-zinc-900 pb-1 text-[10px] flex justify-between"><span class="w-24 overflow-hidden">${mName}</span><span>$${due}</span><span>$${paid}</span><span class="${(paid-due)<0?'text-red-500':'text-emerald-400'}">$${paid-due}</span></div>`; }).join(''); }
    function findCurrentMatch() { const card = document.getElementById('fixture-card'); const m = fixtures.filter(f => f.teamId === activeTeamId).find(f => new Date(f.date) >= new Date(new Date().setHours(0,0,0,0))); if(m) { activeFixtureId = m.id; document.getElementById('match-vs').innerText = "vs " + m.opponent; document.getElementById('match-details').innerText = formatAUDate(m.date); card.classList.remove('hidden'); } else { card.classList.add('hidden'); } }
    function openSquadSelector(fid) { activeFixtureId = fid; const fix = fixtures.find(x => x.id === fid); const teamPlayers = players.filter(p => p.defaultTeam === fix.teamId); const currentSquadIds = fixturesSquad.filter(s => s.fixtureId === fid).map(s => s.playerId); const list = document.getElementById('fixture-squad-picker'); list.innerHTML = teamPlayers.map(p => `<div class="bg-zinc-800/40 p-4 rounded-2xl flex justify-between items-center border border-zinc-800 mb-2"><span class="font-bold text-sm text-white">${p.firstName} ${p.lastName}</span><input type="checkbox" value="${p.id}" ${currentSquadIds.includes(p.id) ? 'checked' : ''} class="w-6 h-6 accent-emerald-500"></div>`).join(''); document.getElementById('squad-modal').classList.remove('hidden'); }
    async function saveFixtureSquad() { const checks = document.querySelectorAll('#fixture-squad-picker input:checked'); const ids = Array.from(checks).map(c => c.value); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "saveFixtureSquad", fixtureId: activeFixtureId, playerIds: ids }) }); hideModal('squad-modal'); await window.loadData(); } catch(e) { alert("Squad Save Error"); } toggleLoader(false); }
    function renderMasterPlayerList() { const list = document.getElementById('master-players-list'); if(list) list.innerHTML = players.map(p => `<div class="bg-zinc-800/30 border border-zinc-800 p-3 rounded-xl flex justify-between items-center mb-1"><div class="font-bold text-xs">${p.firstName} ${p.lastName}</div><button onclick="openEditFromSetup('${p.id}')" class="h-8 w-8 bg-zinc-800 rounded-lg flex items-center justify-center text-zinc-500"><i class="fa-solid fa-pen text-[10px]"></i></button></div>`).join(''); }
    function openEditFromSetup(pid) { currentEditId = pid; const p = players.find(x => x.id === pid); document.getElementById('modal-title').innerText = "Edit Profile"; document.getElementById('player-first').value = p.firstName; document.getElementById('player-last').value = p.lastName; document.getElementById('player-team-assign').value = p.defaultTeam || ""; document.getElementById('player-modal').classList.remove('hidden'); }
    async function handleSeasonUpdate() { const n = document.getElementById('season-input').value.trim(); if(!n) return; toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "updateSeason", name: n, start: '2026-01-01', end: '2026-12-31' }) }); await window.loadData(); alert("Updated."); } catch(err) { alert("Save Error"); } toggleLoader(false); }
    function showAddPlayerModal() { currentEditId = null; document.getElementById('modal-title').innerText = "New Profile"; document.getElementById('player-first').value = ''; document.getElementById('player-last').value = ''; document.getElementById('player-team-assign').value = activeTeamId || ""; document.getElementById('player-modal').classList.remove('hidden'); }
    async function savePlayer() { const f = document.getElementById('player-first').value.trim(); const l = document.getElementById('player-last').value.trim(); const t = document.getElementById('player-team-assign').value; const id = currentEditId || 'p'+Date.now(); toggleLoader(true); try { await fetch(DATABASE_URL, { method: "POST", body: JSON.stringify({ action: "savePlayer", id, firstName: f, lastName: l, isMember: selectedIsMember, defaultTeam: t }) }); hideModal('player-modal'); await window.loadData(); } catch(e) { alert("Save Error"); } toggleLoader(false); }
    function setPlayerType(m) { selectedIsMember = m; document.getElementById('btn-member').className = m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white' : 'flex-1 py-3 rounded-lg text-zinc-500'; document.getElementById('btn-casual').className = !m ? 'flex-1 py-3 rounded-lg bg-emerald-600 text-white' : 'flex-1 py-3 rounded-lg text-zinc-500'; }
    function showGamedaySuggestions() { 
        const input = document.getElementById('gameday-search'); const term = input.value.toLowerCase(); const sug = document.getElementById('gameday-suggestions'); 
        if(!term) { sug.classList.add('hidden'); return; } 
        const filtered = players.filter(p => !selectedForPayment.includes(p.id) && (p.firstName + " " + p.lastName).toLowerCase().includes(term)); 
        const rect = input.getBoundingClientRect(); sug.style.top = (rect.bottom + 5) + 'px'; sug.style.left = rect.left + 'px'; sug.style.width = rect.width + 'px';
        sug.innerHTML = filtered.map(p => `<div onclick="togglePlayerSelection('${p.id}'); document.getElementById('gameday-search').value=''; document.getElementById('gameday-suggestions').classList.add('hidden');" class="p-4 border-b border-zinc-800 flex justify-between items-center"><span class="font-bold text-sm text-zinc-200">${p.firstName} ${p.lastName}</span><span class="text-emerald-500 text-xs">+ Select</span></div>`).join(''); 
        sug.classList.remove('hidden'); 
    }
  </script>
</body>
</html>
